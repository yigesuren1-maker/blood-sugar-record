<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6b3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="血糖记录">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>血糖记录</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #fffdf2;
      --text: #101010;
      --muted: #4b4b4b;
      --green: #0b6b3a;
      --green-dark: #084e2b;
      --line: #d0d0d0;
      --red: #c51616;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 26px;
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    .screen.active {
      display: flex;
    }

    .center {
      justify-content: center;
      gap: 28px;
      text-align: center;
    }

    .home-screen {
      gap: 22px;
    }

    .home-header {
      padding: 18px;
      border-radius: 8px;
      background: var(--green);
      color: var(--white);
      border: 4px solid var(--green-dark);
    }

    .home-title {
      margin: 0;
      font-size: clamp(46px, 13vw, 76px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
    }

    .home-subtitle {
      margin-top: 10px;
      font-size: clamp(24px, 7vw, 38px);
      line-height: 1.22;
      font-weight: 900;
    }

    .home-date {
      margin-top: 14px;
      font-size: clamp(22px, 6vw, 32px);
      line-height: 1.2;
      font-weight: 900;
      color: #eef8ee;
    }

    .start-button {
      width: 100%;
      min-height: 112px;
      border: 0;
      border-radius: 10px;
      padding: 22px 18px;
      background: var(--green);
      color: var(--white);
      box-shadow: 0 9px 0 var(--green-dark);
      font-size: clamp(36px, 10vw, 58px);
      line-height: 1.14;
      font-weight: 900;
      letter-spacing: 0;
      touch-action: manipulation;
    }

    .start-button:active,
    .big-button:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 var(--green-dark);
    }

    .question {
      color: var(--green-dark);
      font-size: clamp(48px, 15vw, 88px);
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: 0;
    }

    .status {
      color: var(--green-dark);
      font-size: clamp(44px, 14vw, 78px);
      line-height: 1.16;
      font-weight: 900;
    }

    .status.error {
      color: var(--red);
    }

    .sync-status {
      color: var(--muted);
      font-size: clamp(30px, 8vw, 46px);
      line-height: 1.2;
      font-weight: 900;
    }

    .sync-status.success {
      color: var(--green-dark);
    }

    .sync-status.fail {
      color: var(--red);
    }

    .summary {
      display: grid;
      gap: 12px;
      background: var(--white);
      border: 4px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      text-align: left;
    }

    .summary-row {
      font-size: clamp(27px, 7vw, 40px);
      line-height: 1.24;
      font-weight: 900;
      word-break: break-word;
    }

    .summary-row span {
      color: var(--muted);
    }

    .big-button {
      width: 100%;
      min-height: 112px;
      border: 0;
      border-radius: 8px;
      padding: 20px 16px;
      color: var(--white);
      background: var(--green);
      box-shadow: 0 6px 0 var(--green-dark);
      font-size: clamp(34px, 10vw, 58px);
      line-height: 1.18;
      font-weight: 900;
      touch-action: manipulation;
    }

    .home-actions {
      display: grid;
      gap: 18px;
      width: 100%;
    }

    .feature-grid {
      display: grid;
      gap: 18px;
    }

    .health-card {
      display: grid;
      gap: 16px;
      padding: 20px;
      border-radius: 8px;
      border: 4px solid var(--line);
      background: var(--white);
      box-shadow: 0 6px 0 rgba(8, 78, 43, 0.16);
    }

    .health-card.record-card {
      border-color: #f0b8b8;
      background: #fff7f7;
    }

    .health-card.recipe-card-home {
      border-color: #b7d7a8;
      background: #f7fff4;
    }

    .health-card-top {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 16px;
      align-items: center;
    }

    .home-illustration {
      width: 112px;
      height: 112px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      border: 4px solid currentColor;
      font-size: 62px;
      background: var(--white);
    }

    .record-card .home-illustration {
      color: #b31321;
      background: #ffe9e9;
    }

    .recipe-card-home .home-illustration {
      color: var(--green-dark);
      background: #ecf8df;
    }

    .feature-title {
      color: var(--text);
      font-size: clamp(30px, 8.8vw, 46px);
      line-height: 1.1;
      font-weight: 900;
    }

    .feature-desc {
      margin-top: 5px;
      color: var(--muted);
      font-size: clamp(20px, 5.7vw, 30px);
      line-height: 1.25;
      font-weight: 900;
    }

    .recipe-button {
      background: #c85f14;
      box-shadow: 0 6px 0 #7a3509;
    }

    .more-panel {
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 8px;
      border: 4px solid var(--line);
      background: var(--white);
    }

    .more-title {
      color: var(--green-dark);
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.15;
      font-weight: 900;
    }

    .more-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .more-item {
      display: grid;
      gap: 6px;
      min-height: 112px;
      padding: 14px;
      border-radius: 8px;
      border: 3px solid var(--line);
      background: #fafafa;
      color: var(--text);
      text-decoration: none;
    }

    .more-item strong {
      font-size: clamp(23px, 6vw, 34px);
      line-height: 1.15;
      font-weight: 900;
    }

    .more-item span {
      color: var(--muted);
      font-size: clamp(18px, 5vw, 26px);
      line-height: 1.2;
      font-weight: 800;
    }

    .recipe-preview,
    .recipe-card,
    .meal-section {
      background: var(--white);
      border: 4px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      text-align: left;
    }

    .recipe-preview {
      font-size: clamp(28px, 8vw, 44px);
      line-height: 1.22;
      font-weight: 900;
      color: var(--green-dark);
    }

    .recipe-title {
      color: var(--green-dark);
      font-size: clamp(38px, 11vw, 62px);
      line-height: 1.12;
      font-weight: 900;
      text-align: center;
    }

    .recipe-list {
      display: grid;
      gap: 18px;
    }

    .meal-section {
      display: grid;
      gap: 14px;
    }

    .meal-title {
      color: var(--green-dark);
      font-size: clamp(34px, 10vw, 54px);
      line-height: 1.12;
      font-weight: 900;
    }

    .dish-grid {
      display: grid;
      gap: 12px;
    }

    .recipe-card {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 14px;
      align-items: center;
      padding: 14px;
      width: 100%;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .food-art {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #f1f8e9;
      border: 4px solid #b7d7a8;
      font-size: 44px;
    }

    .dish-name {
      color: var(--text);
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.14;
      font-weight: 900;
    }

    .dish-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: clamp(22px, 6vw, 32px);
      line-height: 1.22;
      font-weight: 800;
    }

    .recipe-actions {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }

    .dish-detail-hero,
    .detail-block {
      background: var(--white);
      border: 4px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    .dish-detail-hero {
      display: grid;
      gap: 16px;
      justify-items: center;
      text-align: center;
    }

    .detail-art {
      width: 148px;
      height: 148px;
      font-size: 78px;
    }

    .detail-block {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .detail-text,
    .detail-list {
      color: var(--text);
      font-size: clamp(27px, 7vw, 40px);
      line-height: 1.35;
      font-weight: 900;
    }

    .detail-list {
      margin: 0;
      padding-left: 1.35em;
    }

    .detail-list li {
      margin: 10px 0;
    }

    .home-screen {
      gap: 14px;
      padding-bottom: 8px;
      background:
        radial-gradient(circle at 88% 7%, rgba(183, 215, 168, 0.42), transparent 24%),
        radial-gradient(circle at 12% 18%, rgba(255, 248, 218, 0.95), transparent 34%);
    }

    .home-header {
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 12px;
      min-height: 0;
      padding: 18px;
      border: 0;
      border-radius: 24px;
      background: linear-gradient(135deg, #f7fbec 0%, #edf8df 54%, #fff8e7 100%);
      color: var(--text);
      box-shadow: 0 10px 26px rgba(8, 78, 43, 0.1);
    }

    .broadcast-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .broadcast-title {
      color: #075f34;
      text-shadow: 0 3px 0 rgba(7, 95, 52, 0.1);
      white-space: nowrap;
      font-size: clamp(38px, 11vw, 58px);
      line-height: 1.05;
      font-weight: 900;
    }

    .broadcast-desc {
      color: #1f1f1f;
      font-size: clamp(21px, 6vw, 32px);
      line-height: 1.22;
      font-weight: 900;
    }

    .broadcast-icon {
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.86);
      font-size: 42px;
      box-shadow: inset 0 -6px 14px rgba(255, 255, 255, 0.55), 0 8px 18px rgba(8, 78, 43, 0.09);
    }

    .broadcast-weather-icons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .weather-icon-card {
      display: grid;
      gap: 8px;
      place-items: center;
      min-height: 108px;
      padding: 12px 8px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #dcebcf;
      color: #272727;
      box-shadow: 0 4px 16px rgba(8, 78, 43, 0.08);
    }

    .weather-symbol {
      font-size: clamp(42px, 12vw, 68px);
      line-height: 1;
    }

    .weather-name {
      color: #075f34;
      font-size: clamp(22px, 6vw, 34px);
      line-height: 1.1;
      font-weight: 900;
    }

    .broadcast-button {
      min-height: 82px;
      border: 0;
      border-radius: 999px;
      padding: 18px;
      background: linear-gradient(135deg, #23a65a, #0b7c42);
      color: var(--white);
      box-shadow: 0 7px 0 var(--green-dark);
      font-size: clamp(30px, 8vw, 46px);
      line-height: 1.15;
      font-weight: 900;
      touch-action: manipulation;
    }

    .feature-grid {
      grid-template-columns: 1fr;
    }

    .health-card {
      gap: 12px;
      padding: 14px;
      border: 2px solid #d8ecd4;
      border-radius: 22px;
      box-shadow: 0 12px 30px rgba(8, 78, 43, 0.12);
    }

    .health-card.record-card {
      border-color: #cde9da;
      background: linear-gradient(145deg, #ffffff 0%, #f8fffb 100%);
    }

    .health-card.recipe-card-home {
      border-color: #f3d2aa;
      background: linear-gradient(145deg, #fffdf8 0%, #fff8ed 100%);
    }

    .health-card-top {
      grid-template-columns: 94px 1fr;
      gap: 12px;
    }

    .home-illustration {
      border: 0;
      border-radius: 24px;
      width: 94px;
      height: 94px;
      font-size: 48px;
      box-shadow: inset 0 -8px 18px rgba(255, 255, 255, 0.5), 0 10px 18px rgba(0, 0, 0, 0.08);
    }

    .record-card .home-illustration {
      color: #d91f27;
      background: linear-gradient(145deg, #fff2f2, #ffe0e0);
    }

    .recipe-card-home .home-illustration {
      color: #ec6a10;
      background: linear-gradient(145deg, #fff4dc, #ffe4bd);
    }

    .feature-title {
      color: #075f34;
    }

    .recipe-card-home .feature-title {
      color: #e9620f;
    }

    .start-button,
    .recipe-button {
      border-radius: 999px;
      min-height: 82px;
      font-size: clamp(30px, 8vw, 46px);
    }

    .recipe-button {
      background: linear-gradient(135deg, #ff8a1a, #ee610b);
      box-shadow: 0 7px 0 #9a3c05;
    }

    .assistant-button {
      background: linear-gradient(135deg, #38a6ff, #176fd1);
      box-shadow: 0 7px 0 #0b3f7f;
    }

    .return-button {
      min-height: 86px;
      border: 4px solid var(--green);
      border-radius: 999px;
      padding: 16px;
      background: var(--white);
      color: var(--green-dark);
      box-shadow: none;
      font-size: clamp(28px, 8vw, 44px);
      line-height: 1.15;
      font-weight: 900;
      touch-action: manipulation;
    }

    .screen-top-action {
      margin-bottom: 14px;
    }

    .assistant-screen {
      gap: 18px;
    }

    .assistant-panel,
    .assistant-example,
    .assistant-dialog {
      background: var(--white);
      border: 4px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 22px rgba(8, 78, 43, 0.08);
    }

    .assistant-title {
      color: var(--green-dark);
      font-size: clamp(40px, 12vw, 66px);
      line-height: 1.08;
      font-weight: 900;
      text-align: center;
    }

    .assistant-hint,
    .assistant-line {
      color: var(--text);
      font-size: clamp(26px, 7vw, 40px);
      line-height: 1.28;
      font-weight: 900;
      word-break: break-word;
    }

    .assistant-example {
      display: grid;
      gap: 8px;
      color: var(--muted);
    }

    .assistant-example-title {
      color: var(--green-dark);
      font-size: clamp(28px, 8vw, 42px);
      font-weight: 900;
    }

    .assistant-dialog {
      display: grid;
      gap: 12px;
    }

    .assistant-label {
      color: var(--muted);
      font-size: clamp(20px, 6vw, 30px);
      line-height: 1.2;
      font-weight: 900;
    }

    .assistant-actions {
      display: grid;
      gap: 16px;
      margin-top: auto;
    }

    .voice-home {
      justify-content: center;
      gap: 28px;
      text-align: center;
      min-height: calc(100vh - 44px);
    }

    .voice-home-title {
      color: var(--green-dark);
      font-size: clamp(54px, 16vw, 92px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
    }

    .voice-home-subtitle {
      color: var(--text);
      font-size: clamp(28px, 8vw, 44px);
      line-height: 1.25;
      font-weight: 900;
    }

    .voice-start-button {
      width: min(100%, 560px);
      min-height: min(58vh, 430px);
      border: 0;
      border-radius: 34px;
      padding: 34px 22px;
      background: linear-gradient(145deg, #21a85b, #08723d);
      color: var(--white);
      box-shadow: 0 12px 0 var(--green-dark);
      font-size: clamp(50px, 15vw, 88px);
      line-height: 1.12;
      font-weight: 900;
      touch-action: manipulation;
    }

    .voice-start-button:active,
    .mic-button:active {
      transform: translateY(6px);
      box-shadow: 0 5px 0 var(--green-dark);
    }

    .small-recipe-button {
      width: min(100%, 420px);
      min-height: 78px;
      border: 4px solid #ee7b16;
      border-radius: 999px;
      padding: 14px 18px;
      background: var(--white);
      color: #d45d08;
      font-size: clamp(26px, 7vw, 40px);
      line-height: 1.15;
      font-weight: 900;
    }

    .hidden-legacy {
      display: none;
    }

    .assistant-voice-screen {
      justify-content: center;
      gap: 22px;
      text-align: center;
    }

    .mic-button {
      width: min(78vw, 360px);
      height: min(78vw, 360px);
      min-height: 260px;
      border: 0;
      border-radius: 50%;
      margin: 0 auto;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 35% 28%, #75d987, #16a054 58%, #08723d);
      color: var(--white);
      box-shadow: 0 14px 0 var(--green-dark), 0 22px 38px rgba(8, 78, 43, 0.24);
      font-size: clamp(34px, 10vw, 58px);
      line-height: 1.18;
      font-weight: 900;
    }

    .mic-button span {
      display: block;
      font-size: clamp(74px, 22vw, 128px);
      line-height: 1;
      margin-bottom: 10px;
    }

    .assistant-short-tip {
      color: var(--muted);
      font-size: clamp(26px, 7vw, 40px);
      line-height: 1.25;
      font-weight: 900;
    }

    .more-panel {
      border: 0;
      border-radius: 24px;
      background: transparent;
      padding: 0;
    }

    .more-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #0b7c42;
    }

    .more-grid {
      grid-template-columns: 1fr;
    }

    .more-item {
      min-height: 104px;
      justify-items: center;
      text-align: center;
      border-width: 2px;
      border-radius: 22px;
      box-shadow: 0 8px 22px rgba(8, 78, 43, 0.08);
    }

    .more-icon {
      font-size: 42px;
      line-height: 1;
    }

    .bottom-nav {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      align-items: end;
      min-height: 74px;
      padding: 8px 8px 8px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.08);
    }

    .nav-item {
      display: grid;
      gap: 4px;
      justify-items: center;
      color: #777;
      font-size: 15px;
      line-height: 1.1;
      font-weight: 900;
    }

    .nav-icon {
      font-size: 24px;
      line-height: 1;
    }

    .nav-item.active {
      color: #0b7c42;
    }

    .nav-item.voice-main .nav-icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      margin-top: -24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #78c85b, #2ea84d);
      color: #ffffff;
      box-shadow: 0 10px 18px rgba(46, 168, 77, 0.32);
      font-size: 30px;
    }

    @media (min-width: 680px) {
      .feature-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 420px) {
      .home-header {
        padding: 14px 14px;
      }

      .broadcast-icon {
        width: 62px;
        height: 62px;
        border-radius: 20px;
        font-size: 34px;
      }

      .broadcast-weather-icons {
        grid-template-columns: 1fr;
      }

      .health-card-top {
        grid-template-columns: 76px 1fr;
      }

      .home-illustration {
        width: 76px;
        height: 76px;
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="homeScreen" class="screen voice-home active" aria-label="首页">
      <div class="voice-home-title">血糖小助手</div>
      <div class="voice-home-subtitle">点一下，说血糖、天气、日期、睡眠和用药</div>
      <button id="assistantEntryBtn" class="voice-start-button" type="button">开始说话</button>
      <button id="recipeBtn" class="small-recipe-button" type="button">今日食谱</button>
      <div class="hidden-legacy" aria-hidden="true">
        <button id="startBtn" type="button">开始记录</button>
        <button id="broadcastBtn" type="button">播报今天</button>
        <div id="todayRecipePreview"></div>

          method: "GET"

          return response.json();
        }).then(function (data) {
          var current = data && data.current ? data.current : {};
          var temperature = typeof current.temperature_2m === "number" ? Math.round(current.temperature_2m) : "";
          var weather = getWeatherText(current.weather_code);
          todayBroadcast.weather = weather;
          todayBroadcast.temperature = temperature;
          todayBroadcast.weatherReady = Boolean(weather && temperature !== "");
          return todayBroadcast;
        }).catch(function () {
          todayBroadcast.weather = "";
          todayBroadcast.temperature = "";
          todayBroadcast.weatherReady = false;
          return todayBroadcast;
        });

        utterance.volume = 1;
        var voices = window.speechSynthesis.getVoices() || [];
        var voice = voices.find(function (item) {
          return /^zh/i.test(item.lang) && /female|xiaoxiao|huihui|yaoyao|tingting|hanhan|xiaoyi|女|晓|瑶|婷婷|慧/i.test(item.name);
        }) || chooseChineseVoice();
        if (voice) utterance.voice = voice;
        utterance.onerror = function (event) {
          console.log("speechSynthesis error", event && event.error ? event.error : event);
        };
        window.speechSynthesis.speak(utterance);
      }

      function openAssistant() {
        stopAllAudioWork();
        assistantState = null;
        assistantUserText.textContent = "还没开始说话";
        assistantReplyText.textContent = "我在，您说吧。";
        showScreen("assistant");
        speakText("我在，您说吧。");
      }

      function startAssistantListening() {
        stopAllAudioWork();
        assistantUserText.textContent = "正在听……";
        speakText("您说吧。");
        window.setTimeout(beginAssistantRecognition, 650);
      }

      function beginAssistantRecognition() {
        var Recognition = getRecognitionConstructor();
        if (!Recognition) {
          speakText("这个浏览器听不清语音。可以换安卓 Chrome 试试。");
          return;
        }
        assistantUserText.textContent = "正在听……";
        assistantReplyText.textContent = "我听着呢。";
        var recognition = new Recognition();
        activeRecognition = recognition;
        recognitionDone = false;
        recognition.lang = "zh-CN";
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        listenTimer = window.setTimeout(function () {
          if (recognitionDone) return;
          recognitionDone = true;
          try {
            recognition.abort();
          } catch (error) {}
          activeRecognition = null;
          speakText("刚才没听清，您再说一遍。");
        }, LISTEN_TIMEOUT_MS);
        recognition.onresult = function (event) {
          if (recognitionDone) return;
          recognitionDone = true;
          clearTimers();
          var text = event.results && event.results[0] && event.results[0][0] ? event.results[0][0].transcript : "";
          activeRecognition = null;
          handleAssistantInput(dedupeRecognizedText(text));
        };
        recognition.onerror = function () {
          if (recognitionDone) return;
          recognitionDone = true;
          clearTimers();
          activeRecognition = null;
          speakText("刚才没听清，您再说一遍。");
        };
        recognition.onend = function () {
          activeRecognition = null;
        };
        try {
          recognition.start();
        } catch (error) {
          activeRecognition = null;
          speakText("刚才没听清，您再说一遍。");
        }
      }

      function handleAssistantInput(text) {
        var raw = String(text || "").trim();
        assistantUserText.textContent = raw || "没听清";
        if (!raw) {
          speakText("刚才没听清，您再说一遍。可以说，测血糖了，今天天气咋样，今天几号，或者昨晚睡得怎么样。");
          return;
        }
        if (assistantState && assistantState.waiting) {
          handleAssistantFollowUp(raw);
          return;
        }
        if (isHelpIntent(raw)) return speakText("您可以直接说：我测血糖了，今天天气咋样，今天几号，昨晚睡得怎么样，今天药吃了吗，或者今日总结。");
        if (isRecipeIntent(raw)) {
          speakText("好，我给您打开今日食谱。");
          window.setTimeout(showTodayRecipe, 900);
          return;
        }
        if (isSummaryIntent(raw)) return speakTodaySummary();
        if (isDateIntent(raw)) return answerDateIntent(raw);
        if (isWeatherIntent(raw)) return answerWeather();
        if (isSugarHistoryIntent(raw)) return answerSugarHistory(raw);
        if (isSleepIntent(raw)) return handleSleepIntent(raw);
        if (isMedicineIntent(raw)) return handleMedicineIntent(raw);
        if (isSugarRecordIntent(raw)) return handleSugarIntent(raw);
        speakText("刚才没听清，您再说一遍。可以说，测血糖了，今天天气咋样，今天几号，或者昨晚睡得怎么样。");
      }

      function handleAssistantFollowUp(text) {
        if (assistantState.waiting === "sugarPeriod") {
          var period = parseAssistantPeriod(text);
          if (!period) {
            speakText("请问是空腹、饭前、饭后，还是睡前？");
            return;
          }
          assistantState.record.mealRelation = period;
          finishAssistantSugarRecord(assistantState.record);
          return;
        }
        if (assistantState.waiting === "sugarValue") {
          var sugar = parseAssistantNumber(text);
          if (sugar === null) {
            speakText("请说血糖数值。");
            return;
          }
          assistantState.record.bloodSugarValue = sugar;
          finishAssistantSugarRecord(assistantState.record);
          return;
        }
        if (assistantState.waiting === "medicineName") {
          var name = extractMedicineName(text);
          if (!name) {
            speakText("请问吃的是什么药？");
            return;
          }
          saveAssistantRecord("用药", {
            medicineName: name,
            medicineStatus: "未说明",
            rawText: text
          });
          assistantState = null;
          speakText("好，记上了。今天吃了" + name + "。");
          return;
        }
        if (assistantState.waiting === "sleepTime") {
          var sleep = parseSleepInfo(text);
          saveAssistantRecord("睡眠", sleep);
          assistantState = null;
          if (sleep.sleepTime !== "未说明" || sleep.wakeTime !== "未说明") {
            speakText("好，记上了。昨晚" + sleep.sleepTime + "睡，早上" + sleep.wakeTime + "醒。");
          } else {
            speakText("好，先记上。");
          }
        }
      }

      function isSugarRecordIntent(text) {
        return /血糖|测糖/.test(text) && !isSugarHistoryIntent(text);
      }

      function isSugarHistoryIntent(text) {
        return /血糖/.test(text) && /多少|怎么样|记.*吗|今天.*血糖|昨天.*血糖|最近|空腹血糖|饭后血糖/.test(text);
      }

      function isDateIntent(text) {
        return /今天几号|今天多少号|阳历|什么日子|星期|周几|阴历|农历|播报今天|今天情况/.test(text);
      }

      function isWeatherIntent(text) {
        return /天气|冷不冷|热不热|下雨|出门/.test(text);
      }

      function isSleepIntent(text) {
        return /睡|醒|休息|午睡|白天/.test(text) || /昨天药|昨晚/.test(text);
      }

      function isMedicineIntent(text) {
        return /吃药|用药|药吃|记录用药|二甲双胍|利格列汀|漏吃药|少吃|多吃|医生说/.test(text);
      }

      function isSummaryIntent(text) {
        return /今日总结|今天总结|今天记录了什么|我今天记了什么/.test(text);
      }

      function isHelpIntent(text) {
        return /怎么用|会干什么|帮帮我|怎么说/.test(text);
      }

      function isRecipeIntent(text) {
        return /今天吃什么|推荐吃什么|看看食谱|今日食谱/.test(text);
      }

      function handleSugarIntent(text) {
        var record = {
          mealRelation: parseAssistantPeriod(text) || "未说明",
          bloodSugarValue: parseAssistantNumber(text),
          rawText: text
        };
        if (record.bloodSugarValue === null) {
          assistantState = { waiting: "sugarValue", record: record };
          speakText("请说血糖数值。");
          return;
        }
        finishAssistantSugarRecord(record);
      }

      function finishAssistantSugarRecord(record) {
        assistantState = null;
        var saved = saveAssistantRecord("血糖", {
          mealRelation: record.mealRelation,
          bloodSugarValue: String(record.bloodSugarValue),
          rawText: record.rawText
        });
        var periodText = saved.mealRelation === "未说明" ? "" : saved.mealRelation;
        var reply = "好，记上了。" + periodText + "血糖" + formatSugarForSpeech(saved.bloodSugarValue) + "。";
        var value = Number(saved.bloodSugarValue);
        if (value >= 10) reply += "这个数有点高。先别着急，注意少吃甜的。要是连续几次都高，就告诉家里人。";
        if (value > 0 && value <= 3.9) reply += "这个数有点低。要是心慌、出汗、手抖，赶紧告诉家里人。";
        speakText(reply);
      }

      function formatSugarForSpeech(value) {
        var text = String(value || "");
        if (text.indexOf(".") === -1) return numberToChinese(Number(text));
        var parts = text.split(".");
        return numberToChinese(Number(parts[0])) + "点" + parts[1].split("").map(function (digit) {
          return numberToChinese(Number(digit));
        }).join("");
      }

      function numberToChinese(number) {
        var map = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
        var value = Number(number);
        if (!Number.isFinite(value)) return String(number);
        if (value < 10) return map[value] || String(value);
        if (value === 10) return "十";
        if (value < 20) return "十" + (value % 10 ? map[value % 10] : "");
        if (value < 100) return map[Math.floor(value / 10)] + "十" + (value % 10 ? map[value % 10] : "");
        return String(value);
      }

      function parseAssistantPeriod(text) {
        if (/空腹/.test(text)) return "空腹";
        if (/饭前|餐前/.test(text)) return "饭前";
        if (/饭后|餐后/.test(text)) return "饭后";
        if (/睡前/.test(text)) return "睡前";
        return "";
      }

      function parseAssistantNumber(text) {
        var value = String(text || "");
        var chineseDecimal = value.match(/[零一二两三四五六七八九十百]+点[零一二两三四五六七八九]+/);
        if (chineseDecimal) {
          var parts = chineseDecimal[0].split("点");
          return Number(chineseIntegerToNumber(parts[0]) + "." + chineseDigitsToString(parts[1]));
        }
        var normalized = normalizeNumberText(value);
        var arabic = normalized.match(/\d+(?:\.\d+)?/);
        if (arabic) return Number(arabic[0]);
        var chinese = value.match(/[零一二两三四五六七八九十百]+/);
        if (chinese) return chineseIntegerToNumber(chinese[0]);
        return null;
      }

      function chineseDigitsToString(text) {
        var map = { "零": "0", "一": "1", "二": "2", "两": "2", "三": "3", "四": "4", "五": "5", "六": "6", "七": "7", "八": "8", "九": "9" };
        return String(text || "").split("").map(function (char) {
          return map[char] || "";
        }).join("");
      }

      function chineseIntegerToNumber(text) {
        var map = { "零": 0, "一": 1, "二": 2, "两": 2, "三": 3, "四": 4, "五": 5, "六": 6, "七": 7, "八": 8, "九": 9 };
        var value = String(text || "");
        if (/^\d+$/.test(value)) return Number(value);
        if (value.indexOf("百") !== -1) {
          var parts = value.split("百");
          var hundred = parts[0] ? (map[parts[0]] || 1) : 1;
          var rest = parts[1] || "";
          if (rest.length === 1 && map[rest] != null) return hundred * 100 + map[rest] * 10;
          return hundred * 100 + (rest ? chineseIntegerToNumber(rest) : 0);
        }
        if (value.indexOf("十") !== -1) {
          var tenParts = value.split("十");
          var tens = tenParts[0] ? (map[tenParts[0]] || 1) : 1;
          var ones = tenParts[1] ? (map[tenParts[1]] || 0) : 0;
          return tens * 10 + ones;
        }
        return Number(chineseDigitsToString(value)) || 0;
      }

      function answerDateIntent(text) {
        renderTodayBroadcastDate();
        if (/阴历|农历/.test(text)) {
          speakText("今天农历" + todayBroadcast.lunarDate + "。");
          return;
        }
        if (/星期|周几/.test(text)) {
          speakText("今天是" + todayBroadcast.weekday + "。");
          return;
        }
        if (/播报今天|今天情况/.test(text)) {
          speakTodayBroadcast();
          return;
        }
        speakText("今天是" + formatShortSolarDate(new Date()) + "，" + todayBroadcast.weekday + "。");
      }

      function answerWeather() {
        stopAllAudioWork();
        loadYushuWeather().then(function () {
          if (todayBroadcast.weatherReady) {
            speakText("榆树今天" + todayBroadcast.weather + "，" + todayBroadcast.temperature + "度。出门看着点儿天气。");
          } else {
            speakText("榆树天气暂时没取到，过会儿再试试。");
          }
        });
      }

      function formatShortSolarDate(date) {
        return (date.getMonth() + 1) + "月" + date.getDate() + "号";
      }

      function answerSugarHistory(text) {
        var records = getRecordsForAssistant("血糖");
        var rangeLabel = "今天";
        if (/昨天/.test(text)) {
          rangeLabel = "昨天";
          records = records.filter(function (record) {
            return record.recordDate === formatDate(addDays(new Date(), -1));
          });
        } else if (!/最近/.test(text)) {
          records = records.filter(function (record) {
            return record.recordDate === formatDate(new Date());
          });
        } else {
          rangeLabel = "最近";
        }
        if (/空腹/.test(text)) records = records.filter(function (record) { return record.mealRelation === "空腹"; });
        if (/饭后/.test(text)) records = records.filter(function (record) { return record.mealRelation === "饭后"; });
        if (!records.length) {
          speakText(rangeLabel === "今天" ? "今天还没记血糖。需要现在记一下吗？" : "还没找到血糖记录。您可以先说，我测血糖了。");
          return;
        }
        var summary = records.slice(0, 4).map(function (record) {
          return (record.mealRelation && record.mealRelation !== "未说明" ? record.mealRelation : "") + record.bloodSugarValue;
        }).join("，");
        speakText(rangeLabel + "记了" + countToChinese(records.length) + "回血糖。" + summary + "。");
      }

      function handleSleepIntent(text) {
        var info = parseSleepInfo(text);
        var saved = saveAssistantRecord("睡眠", info);
        if (/睡得不好|没睡好|醒了好几次/.test(text) && saved.sleepTime === "未说明" && saved.wakeTime === "未说明") {
          assistantState = { waiting: "sleepTime", record: saved };
          speakText("好，先记上。昨晚睡得不好。您还记得几点睡、几点醒吗？");
          return;
        }
        if (saved.dayRest !== "未说明" && saved.dayRestDuration !== "未说明") {
          speakText("好，记上了。白天休息" + saved.dayRestDuration + "。");
          return;
        }
        if (saved.dayRest !== "未说明") {
          speakText("好，白天休息也记上了。");
          return;
        }
        if (saved.medicineStatus !== "未说明") {
          var reply = "好，记上了。昨天用药情况是" + saved.medicineStatus + "。";
          if (saved.medicineStatus !== "正常") reply += "这个事儿最好让家里人知道。";
          speakText(reply);
          return;
        }
        if (saved.sleepTime !== "未说明" || saved.wakeTime !== "未说明") {
          speakText("好，记上了。昨晚" + saved.sleepTime + "睡，早上" + saved.wakeTime + "醒。");
          return;
        }
        speakText("好，先记上。昨晚睡得不好。您还记得几点睡、几点醒吗？");
        assistantState = { waiting: "sleepTime", record: saved };
      }

      function parseSleepInfo(text) {
        return {
          sleepDateLabel: "昨天晚上到今天早上",
          sleepTime: extractTimeBefore(text, /睡/),
          wakeTime: extractTimeBefore(text, /醒|起/),
          nightWake: /醒了|醒好几次|起夜|睡得不好|没睡好/.test(text) ? "是" : "未说明",
          dayRest: /白天|中午|下午|午睡|休息/.test(text) ? (/没有休息|没休息/.test(text) ? "否" : "是") : "未说明",
          dayRestDuration: extractRestDuration(text),
          medicineStatus: parseMedicineStatus(text),
          rawText: text,
          note: text
        };
      }

      function extractTimeBefore(text, marker) {
        var matches = String(text || "").match(/(?:昨晚|昨天晚上|今天早上|早上|晚上)?[零一二两三四五六七八九十\d]{1,3}点半?/g) || [];
        if (!matches.length) return "未说明";
        if (marker.test("睡") && /睡/.test(text)) {
          return matches[0].replace(/^(昨晚|昨天晚上|今天早上|早上|晚上)/, "");
        }
        if ((/醒|起/.test(String(marker)) || /醒|起/.test(text)) && matches.length > 1) {
          return matches[1].replace(/^(昨晚|昨天晚上|今天早上|早上|晚上)/, "");
        }
        if (/醒|起/.test(text) && matches.length === 1) return matches[0].replace(/^(昨晚|昨天晚上|今天早上|早上|晚上)/, "");
        return matches[0].replace(/^(昨晚|昨天晚上|今天早上|早上|晚上)/, "");
      }

      function extractRestDuration(text) {
        var match = String(text || "").match(/[零一二两三四五六七八九十\d]+(?:个)?小时|半小时|[零一二两三四五六七八九十\d]+分钟/);
        return match ? match[0] : "未说明";
      }

      function handleMedicineIntent(text) {
        var status = parseMedicineStatus(text);
        var name = extractMedicineName(text);
        if (status === "正常" && /医生说/.test(text)) {
          saveAssistantRecord("用药", { medicineName: name || "未说明", medicineStatus: "正常", rawText: text });
          speakText("好，记上了。药按医生说的吃了。");
          return;
        }
        if (status !== "未说明" && status !== "正常") {
          saveAssistantRecord("用药", { medicineName: name || "未说明", medicineStatus: status, rawText: text });
          speakText("好，我记上。今天药" + status + "了。这个事儿最好让家里人知道。");
          return;
        }
        if (!name) {
          assistantState = { waiting: "medicineName", record: { medicineStatus: status, rawText: text } };
          speakText("请问吃的是什么药？");
          return;
        }
        saveAssistantRecord("用药", { medicineName: name, medicineStatus: status, rawText: text });
        speakText("好，记上了。今天吃了" + name + "。");
      }

      function parseMedicineStatus(text) {
        if (/漏吃/.test(text)) return "漏吃";
        if (/少吃/.test(text)) return "少吃";
        if (/多吃/.test(text)) return "多吃";
        if (/按医生|医生说|正常/.test(text)) return "正常";
        return "未说明";
      }

      function extractMedicineName(text) {
        var match = String(text || "").match(/(?:吃了|吃的|记录用药)?([\u4e00-\u9fa5A-Za-z]{2,12})(?:吃了|一片|两片|二片|半片|了)?/);
        if (/二甲双胍/.test(text)) return "二甲双胍";
        if (/利格列汀/.test(text)) return "利格列汀";
        if (!match) return "";
        var name = match[1].replace(/今天|药|我|吃了|记录|用药|按医生|说的|少吃|多吃|漏吃/g, "");
        return name.length >= 2 ? name : "";
      }

      function speakTodaySummary() {
        var today = formatDate(new Date());
        var records = getLocalRecords().filter(function (record) {
          return record.recordDate === today || String(record.createdAt || "").slice(0, 10) === today;
        });
        if (!records.length) {
          speakText("今天还没记东西。可以先说，我测血糖了，或者昨晚睡得怎么样。");
          return;
        }
        var sugar = getRecordsForAssistant("血糖").filter(function (record) { return record.recordDate === today; });
        var sleep = getRecordsForAssistant("睡眠").filter(function (record) { return record.recordDate === today; })[0];
        var medicine = getRecordsForAssistant("用药").filter(function (record) { return record.recordDate === today; })[0];
        var parts = [];
        if (sugar.length) {
          parts.push("今天记了" + countToChinese(sugar.length) + "回血糖。" + sugar.slice(0, 3).map(function (record) {
            return (record.mealRelation !== "未说明" ? record.mealRelation : "") + record.bloodSugarValue;
          }).join("，") + "。");
        }
        if (sleep) parts.push("睡眠也记了，昨晚" + sleep.sleepTime + "睡，早上" + sleep.wakeTime + "醒。");
        if (medicine) parts.push(medicine.medicineStatus === "正常" ? "药是按医生说的吃的。" : "用药情况是" + medicine.medicineStatus + "。");
        speakText(parts.length ? parts.join("") : "今天还没记东西。可以先说，我测血糖了，或者昨晚睡得怎么样。");
      }

      function saveAssistantRecord(type, data) {
        var now = new Date();
        var record = Object.assign({
          elderId: CONFIG.elderId,
          family_key: CONFIG.family_key,
          recordType: type,
          recordDate: formatDate(now),
          recordTime: formatTime(now),
          createdAt: now.toISOString(),
          createdAtMs: now.getTime()
        }, data || {});
        saveLocalRecord(record);
        return record;
      }

      function getRecordsForAssistant(type) {
        return getLocalRecords().filter(function (record) {
          if (type === "血糖") return record.recordType === "血糖" || record.bloodSugarValue;
          return record.recordType === type;
        }).map(function (record) {
          return Object.assign({
            mealRelation: record.mealRelation || "未说明",
            bloodSugarValue: record.bloodSugarValue || "未记录",
            sleepTime: record.sleepTime || "未说明",
            wakeTime: record.wakeTime || "未说明",
            medicineStatus: record.medicineStatus || "未说明"
          }, record);
        });
      }

      function countToChinese(count) {
        return ["零", "一", "两", "三", "四", "五", "六", "七", "八", "九", "十"][count] || String(count);
      }

      function addDays(date, days) {
        var next = new Date(date);
        next.setDate(next.getDate() + days);
        return next;
      }

      function listenForStep(step, isStartRetry) {
        var nativeSpeech = getNativeSpeechRecognition();
        if (nativeSpeech) {
          listenForStepNative(step, nativeSpeech);
          return;
        }

        var Recognition = getRecognitionConstructor();
        if (!Recognition) {
          handleStepNoAnswer(step);
          return;
        }

        clearTimers();
        stopRecognition();
        recognitionDone = false;

        var recognition = new Recognition();
        activeRecognition = recognition;
        var listenStarted = false;
        recognition.lang = "zh-CN";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.continuous = false;

        var startCheckTimer = window.setTimeout(function () {
          if (listenStarted || recognitionDone || isStartRetry) return;
          try {
            recognition.abort();
          } catch (error) {}
          activeRecognition = null;
          window.setTimeout(function () {
            if (!session) return;
            listenForStep(step, true);
          }, RECOGNITION_RETRY_DELAY_MS);
        }, RECOGNITION_RETRY_DELAY_MS);

        recognition.onstart = function () {
          listenStarted = true;
          window.clearTimeout(startCheckTimer);
          listenTimer = window.setTimeout(function () {
            handleStepNoAnswer(step);
          }, LISTEN_TIMEOUT_MS);
        };

        recognition.onresult = function (event) {
          if (recognitionDone) return;
          recognitionDone = true;
          window.clearTimeout(startCheckTimer);
          clearTimers();

          var text = "";
          if (event.results && event.results[0] && event.results[0][0]) {
            text = event.results[0][0].transcript || "";
          }

          if (!String(text).trim()) {
            handleStepNoAnswer(step);
            return;
          }

          activeRecognition = null;
          saveStepAnswer(step, String(text).trim());
        };

        recognition.onerror = function () {
          if (recognitionDone) return;
          recognitionDone = true;
          window.clearTimeout(startCheckTimer);
          if (!listenStarted && !isStartRetry) {
            activeRecognition = null;
            window.setTimeout(function () {
              if (!session) return;
              listenForStep(step, true);
            }, RECOGNITION_RETRY_DELAY_MS);
            return;
          }
          handleStepNoAnswer(step);
        };

        recognition.onend = function () {
          if (recognitionDone) return;
          recognitionDone = true;
          window.clearTimeout(startCheckTimer);
          if (!listenStarted && !isStartRetry) {
            activeRecognition = null;
            window.setTimeout(function () {
              if (!session) return;
              listenForStep(step, true);
            }, RECOGNITION_RETRY_DELAY_MS);
            return;
          }
          handleStepNoAnswer(step);
        };

        try {
          recognition.start();
        } catch (error) {
          window.clearTimeout(startCheckTimer);
          if (!isStartRetry) {
            activeRecognition = null;
            window.setTimeout(function () {
              if (!session) return;
              listenForStep(step, true);
            }, RECOGNITION_RETRY_DELAY_MS);
            return;
          }
          handleStepNoAnswer(step);
        }
      }

      function getNativeSpeechRecognition() {
        if (!window.Capacitor || !window.Capacitor.Plugins) return null;
        return window.Capacitor.Plugins.SpeechRecognition || null;
      }

      function listenForStepNative(step, nativeSpeech) {
        clearTimers();
        stopRecognition();
        recognitionDone = false;

        Promise.resolve()
          .then(function () {
            if (nativeSpeech.available) return nativeSpeech.available();
            return { available: true };
          })
          .then(function (result) {
            if (result && result.available === false) throw new Error("语音识别不可用");
            if (nativeSpeech.requestPermissions) return nativeSpeech.requestPermissions();
            return null;
          })
          .then(function () {
            listenTimer = window.setTimeout(function () {
              handleStepNoAnswer(step);
            }, LISTEN_TIMEOUT_MS);
            return nativeSpeech.start({
              language: "zh-CN",
              maxResults: 1,
              partialResults: false,
              popup: false,
              prompt: step.prompt
            });
          })
          .then(function (result) {
            if (recognitionDone) return;
            recognitionDone = true;
            clearTimers();
            var text = "";
            if (result && Array.isArray(result.matches) && result.matches.length) {
              text = result.matches[0] || "";
            }
            if (!String(text).trim()) {
              handleStepNoAnswer(step);
              return;
            }
            saveStepAnswer(step, String(text).trim());
          })
          .catch(function () {
            if (recognitionDone) return;
            recognitionDone = true;
            clearTimers();
            handleStepNoAnswer(step);
          });
      }

      function handleStepNoAnswer(step) {
        if (!session) return;
        clearTimers();
        stopRecognition();

        var failCount = (session.failures[step.key] || 0) + 1;
        session.failures[step.key] = failCount;
        statusText.textContent = "没听清";
        statusText.classList.add("error");
        showScreen("question");
        speakPrompt("没听清", function () {
          if (!session) return;
          if (failCount < 2) {
            window.setTimeout(function () {
              if (!session) return;
              listenForStep(step, false);
            }, RECOGNITION_START_DELAY_MS);
            return;
          }
          session.answers[step.key] = "未记录";
          session.index += 1;
          runCurrentStep();
        });
      }

      function saveStepAnswer(step, text) {
        if (!session) return;
        session.answers[step.key] = dedupeRecognizedText(text) || "未记录";
        session.index += 1;
        runCurrentStep();
      }

      function normalizeNumberText(text) {
        return String(text || "")
          .replace(/一百/g, "100")
          .replace(/一/g, "1")
          .replace(/二/g, "2")
          .replace(/两/g, "2")
          .replace(/三/g, "3")
          .replace(/四/g, "4")
          .replace(/五/g, "5")
          .replace(/六/g, "6")
          .replace(/七/g, "7")
          .replace(/八/g, "8")
          .replace(/九/g, "9")
          .replace(/零/g, "0")
          .replace(/点/g, ".");
      }

      function parseBloodPressure(text) {
        var normalized = normalizeNumberText(text);
        var numbers = normalized.match(/\d+(?:\.\d+)?/g) || [];
        return {
          systolicPressure: numbers[0] || "未记录",
          diastolicPressure: numbers[1] || "未记录"
        };
      }

      function finishThreeStepRecord() {
        if (!session) return;
        stopAllAudioWork();

        var now = new Date();
        var pressureText = session.answers.bloodPressure || "未记录";
        var sugarText = session.answers.bloodSugar || "未记录";
        var medicineText = session.answers.medicine || "未记录";
        var pressure = parseBloodPressure(pressureText);
        var sugarValue = parseNumericValue(sugarText);
        var period = parsePeriod(sugarText);
        var medicineCount = parseMedicineCount(medicineText);
        var record = {
          elderId: CONFIG.elderId,
          family_key: CONFIG.family_key,
          recordDate: formatDate(now),
          recordTime: formatTime(now),
          medicineTime: "未记录",
          medicineName: medicineText,
          medicineCount: medicineCount,
          bloodSugarTime: "未记录",
          mealRelation: period,
          bloodSugarValue: sugarValue === null ? "未记录" : String(sugarValue),
          systolicPressure: pressure.systolicPressure,
          diastolicPressure: pressure.diastolicPressure,
          symptoms: "未记录",
          answersRaw: {
            bloodPressure: pressureText,
            bloodSugar: sugarText,
            medicine: medicineText
          },
          createdAt: now.toISOString(),
          createdAtMs: now.getTime(),
          uploadStatus: "pending"
        };

        saveLocalRecord(record);
        session = null;
        renderSummary(record);
        setSyncStatus("正在同步到云端", "");
        showScreen("complete");
        uploadRecord(record);
        speakPrompt("已保存", function () {});
      }

      function dedupeRecognizedText(text) {
        var value = String(text || "").replace(/\s+/g, "").trim();
        if (!value) return "";
        if (value.length % 2 === 0) {
          var half = value.length / 2;
          if (value.slice(0, half) === value.slice(half)) return value.slice(0, half);
        }
        var best = value;
        for (var size = 3; size <= Math.floor(value.length / 2); size += 1) {
          var part = value.slice(0, size);
          if (part && value === part.repeat(Math.floor(value.length / size)) && value.length % size === 0) {
            best = part;
            break;
          }
        }
        return best;
      }

      function parsePeriod(text) {
        var value = String(text || "");
        if (/空腹/.test(value)) return "空腹";
        if (/饭前|餐前/.test(value)) return "饭前";
        if (/饭后|餐后/.test(value)) return "饭后";
        if (/睡前/.test(value)) return "睡前";
        return "随机";
      }

      function parseMedicineCount(text) {
        var normalized = normalizeNumberText(text);
        var match = normalized.match(/(\d+(?:\.\d+)?)\s*片/);
        return match ? match[1] : "未记录";
      }

      function uploadRecord(record) {
        var payload = cleanPayload(toSupabaseRecord(record));
        console.log("supabase add health_records payload", payload);
        fetch(CONFIG.supabaseUrl + "/rest/v1/health_records", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": CONFIG.supabaseKey,
            "Authorization": "Bearer " + CONFIG.supabaseKey,
            "Prefer": "return=representation"
          },
          body: JSON.stringify(payload)
        }).then(function (response) {
          if (!response.ok) {
            return response.text().then(function (text) {
              throw new Error("HTTP " + response.status + " " + response.statusText + " " + text);
            });
          }
          return response.json().catch(function () {
            return [];
          });
        }).then(function () {
          setSyncStatus("云端同步成功", "success");
        }).catch(function (error) {
          setSyncStatus("已本地保存，上传失败：" + getErrorMessage(error), "fail");
        });
      }

      function toSupabaseRecord(record) {
        var sugarValue = parseNumericValue(record.bloodSugarValue);
        return {
          family_key: CONFIG.family_key,
          value: sugarValue,
          period: record.mealRelation || "随机",
          note: JSON.stringify({
            elderId: record.elderId,
            recordDate: record.recordDate,
            recordTime: record.recordTime,
            medicineTime: record.medicineTime,
            medicineName: record.medicineName,
            medicineCount: record.medicineCount,
            bloodSugarTime: record.bloodSugarTime,
            mealRelation: record.mealRelation,
            bloodSugarValue: record.bloodSugarValue,
            systolicPressure: record.systolicPressure,
            diastolicPressure: record.diastolicPressure,
            answersRaw: record.answersRaw
          }),
          created_at: record.createdAt
        };
      }

      function parseNumericValue(value) {
        var text = String(value || "")
          .replace(/点/g, ".")
          .replace(/零/g, "0")
          .replace(/一/g, "1")
          .replace(/二/g, "2")
          .replace(/两/g, "2")
          .replace(/三/g, "3")
          .replace(/四/g, "4")
          .replace(/五/g, "5")
          .replace(/六/g, "6")
          .replace(/七/g, "7")
          .replace(/八/g, "8")
          .replace(/九/g, "9");
        var match = text.match(/\d+(?:\.\d+)?/);
        if (!match) return null;
        var number = Number(match[0]);
        if (!Number.isFinite(number)) return null;
        return number;
      }

      function cleanPayload(value) {
        if (Array.isArray(value)) {
          return value.map(cleanPayload).filter(function (item) {
            return item !== undefined && item !== null;
          });
        }
        if (value && typeof value === "object") {
          var output = {};
          Object.keys(value).forEach(function (key) {
            var item = cleanPayload(value[key]);
            if (item !== undefined && item !== null) output[key] = item;
          });
          return output;
        }
        return value;
      }

      function setSyncStatus(text, state) {
        syncStatus.textContent = text;
        syncStatus.classList.remove("success", "fail");
        if (state) syncStatus.classList.add(state);
      }

      function getErrorMessage(error) {
        if (!error) return "未知错误";
        if (typeof error === "string") return error;
        return error.message || error.errMsg || JSON.stringify(error);
      }

      function renderSummary(record) {
        summaryBox.innerHTML = "";
        [
          ["吃药时间", record.medicineTime],
          ["药物", record.medicineName],
          ["药量", record.medicineCount],
          ["测糖时间", record.bloodSugarTime],
          ["时段", record.mealRelation],
          ["血糖", record.bloodSugarValue],
          ["高压", record.systolicPressure],
          ["低压", record.diastolicPressure]
        ].forEach(function (item) {
          var row = document.createElement("div");
          row.className = "summary-row";
          row.innerHTML = "<span>" + item[0] + "：</span>" + escapeHtml(item[1]);
          summaryBox.appendChild(row);
        });
      }

      function dish(name, note, icon) {
        return {
          name: name,
          note: note,
          icon: icon,
          ingredients: getDefaultIngredients(name),
          steps: getDefaultSteps(name),
          tips: "少油少盐，不放糖。主食要定量，蔬菜可以多一些，按平时医嘱用药。"
        };
      }

      function getDefaultIngredients(name) {
        if (/鱼|鲈鱼/.test(name)) return "鱼一小份、姜丝、葱、少量酱油。";
        if (/鸡|鸡胸|鸡腿/.test(name)) return "去皮鸡肉一小份、青菜、姜片、少量盐。";
        if (/豆腐|豆干|豆浆|豆腐脑/.test(name)) return "豆腐或豆制品一小份、青菜、葱花、少量盐。";
        if (/蛋|鸡蛋/.test(name)) return "鸡蛋一个、番茄或绿叶菜、少量植物油。";
        if (/粥|饭|馒头|窝头|玉米|红薯|南瓜|杂粮/.test(name)) return "主食一小份、搭配鸡蛋或豆制品、绿叶菜。";
        if (/汤/.test(name)) return "新鲜蔬菜、少量瘦肉或豆腐、清水、少量盐。";
        if (/木耳|菠菜|白菜|油麦菜|小白菜|莴笋|西兰花|冬瓜|黄瓜|番茄|芹菜|苦瓜|生菜|茄子|丝瓜|青菜|蔬菜/.test(name)) return "新鲜蔬菜一盘、蒜末少量、植物油少量、盐少量。";
        if (/杏仁|毛豆|梨|苹果|坚果/.test(name)) return "加餐一小份，按血糖情况少量食用。";
        return "新鲜食材一小份、绿叶菜、少量植物油、少量盐。";
      }

      function getDefaultSteps(name) {
        if (/凉拌|拌/.test(name)) {
          return ["食材洗净，能焯水的先焯水。", "放少量盐和少量油拌匀。", "不要加糖，主食另外定量。"];
        }
        if (/清蒸|蒸/.test(name)) {
          return ["食材洗净处理好。", "上锅清蒸到熟透。", "出锅后少量调味，不要放糖。"];
        }
        if (/汤|炖/.test(name)) {
          return ["食材洗净切好。", "加清水煮熟或炖熟。", "最后少盐调味，少喝油汤。"];
        }
        if (/粥|饭|馒头|窝头|玉米|红薯|南瓜|杂粮/.test(name)) {
          return ["按一小份准备主食。", "搭配蔬菜和优质蛋白一起吃。", "吃完观察血糖，不要再额外加甜食。"];
        }
        return ["食材洗净切好。", "锅里少放油，炒熟或煮熟。", "少盐调味，不放糖，趁温热食用。"];
      }

      function getTodayRecipe() {
        var now = new Date();
        var start = new Date(now.getFullYear(), 0, 0);
        var dayOfYear = Math.floor((now - start) / 86400000);
        return weeklyRecipes[dayOfYear % weeklyRecipes.length];
      }

      function getMealLabel(key) {
        if (key === "breakfast") return "早餐";
        if (key === "lunch") return "午餐";
        if (key === "dinner") return "晚餐";
        return "加餐";
      }

      function renderRecipePreview() {
        var recipe = getTodayRecipe();
        todayRecipePreview.textContent = "推荐适合控糖的家常饭菜：" + recipe.breakfast[0].name + "、" + recipe.lunch[0].name + "、" + recipe.dinner[0].name;
      }

      function showTodayRecipe() {
        stopAllAudioWork();
        currentRecipe = getTodayRecipe();
        renderRecipe(currentRecipe);
        showScreen("recipe");
      }

      function renderRecipe(recipe) {
        recipeTitle.textContent = "今日食谱推荐";
        recipeList.innerHTML = "";
        ["breakfast", "lunch", "dinner", "snack"].forEach(function (mealKey) {
          var section = document.createElement("section");
          section.className = "meal-section";

          var title = document.createElement("div");
          title.className = "meal-title";
          title.textContent = getMealLabel(mealKey);
          section.appendChild(title);

          var grid = document.createElement("div");
          grid.className = "dish-grid";
          recipe[mealKey].forEach(function (item) {
            grid.appendChild(createDishCard(item));
          });
          section.appendChild(grid);
          recipeList.appendChild(section);
        });
      }

      function createDishCard(item) {
        var card = document.createElement("button");
        card.className = "recipe-card";
        card.type = "button";
        card.setAttribute("aria-label", "查看" + item.name + "做法");
        card.addEventListener("click", function () {
          showDishDetail(item);
        });

        var art = document.createElement("div");
        art.className = "food-art";
        art.textContent = item.icon;

        var content = document.createElement("div");
        var name = document.createElement("div");
        name.className = "dish-name";
        name.textContent = item.name;
        var note = document.createElement("div");
        note.className = "dish-note";
        note.textContent = item.note;

        content.appendChild(name);
        content.appendChild(note);
        card.appendChild(art);
        card.appendChild(content);
        return card;
      }

      function showDishDetail(item) {
        stopAllAudioWork();
        currentDish = item;
        dishDetailTitle.textContent = item.name;
        dishDetailIcon.textContent = item.icon;
        dishDetailNote.textContent = item.note;
        dishIngredients.textContent = item.ingredients || "未记录";
        dishTips.textContent = item.tips || "少油少盐，主食定量。";
        dishSteps.innerHTML = "";
        (item.steps || []).forEach(function (step) {
          var li = document.createElement("li");
          li.textContent = step;
          dishSteps.appendChild(li);
        });
        showScreen("dish");
      }

      function speakDish(item) {
        var text = item.name + "。食材：" + (item.ingredients || "按家常少量准备") +
          "。做法：" + (item.steps || []).join("。") +
          "。注意少油少盐，主食定量。";
        speakPrompt(text, function () {});
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      startBtn.addEventListener("click", startSession);
      assistantEntryBtn.addEventListener("click", openAssistant);
      againBtn.addEventListener("click", startSession);
      recipeBtn.addEventListener("click", showTodayRecipe);
      broadcastBtn.addEventListener("click", speakTodayBroadcast);
      assistantTalkBtn.addEventListener("click", startAssistantListening);
      assistantHomeBtn.addEventListener("click", returnHome);
      questionHomeBtn.addEventListener("click", returnHome);
      completeHomeBtn.addEventListener("click", returnHome);
      recipeTopHomeBtn.addEventListener("click", returnHome);
      backHomeBtn.addEventListener("click", returnHome);
      readDishBtn.addEventListener("click", function () {
        if (currentDish) speakDish(currentDish);
      });
      backRecipeBtn.addEventListener("click", function () {
        stopAllAudioWork();
        if (!currentRecipe) currentRecipe = getTodayRecipe();
        renderRecipe(currentRecipe);
        showScreen("recipe");
      });
      dishHomeBtn.addEventListener("click", returnHome);

      renderTodayBroadcastDate();
      renderRecipePreview();

      if ("speechSynthesis" in window) {
        window.speechSynthesis.onvoiceschanged = chooseChineseVoice;
      }

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("service-worker.js").catch(function () {});
        });
      }
    })();
  </script>
