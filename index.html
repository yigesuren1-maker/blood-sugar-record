<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6b3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="血糖记录">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>血糖记录</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #fffdf2;
      --text: #101010;
      --muted: #4b4b4b;
      --green: #0b6b3a;
      --green-dark: #084e2b;
      --line: #d0d0d0;
      --red: #c51616;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 26px;
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    .screen.active {
      display: flex;
    }

    .center {
      justify-content: center;
      gap: 28px;
      text-align: center;
    }

    .start-button {
      width: 100%;
      min-height: 78vh;
      border: 0;
      border-radius: 10px;
      padding: 28px 20px;
      background: var(--green);
      color: var(--white);
      box-shadow: 0 9px 0 var(--green-dark);
      font-size: clamp(56px, 17vw, 96px);
      line-height: 1.14;
      font-weight: 900;
      letter-spacing: 0;
      touch-action: manipulation;
    }

    .start-button:active,
    .big-button:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 var(--green-dark);
    }

    .question {
      color: var(--green-dark);
      font-size: clamp(48px, 15vw, 88px);
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: 0;
    }

    .status {
      color: var(--green-dark);
      font-size: clamp(44px, 14vw, 78px);
      line-height: 1.16;
      font-weight: 900;
    }

    .status.error {
      color: var(--red);
    }

    .sync-status {
      color: var(--muted);
      font-size: clamp(30px, 8vw, 46px);
      line-height: 1.2;
      font-weight: 900;
    }

    .sync-status.success {
      color: var(--green-dark);
    }

    .sync-status.fail {
      color: var(--red);
    }

    .summary {
      display: grid;
      gap: 12px;
      background: var(--white);
      border: 4px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      text-align: left;
    }

    .summary-row {
      font-size: clamp(27px, 7vw, 40px);
      line-height: 1.24;
      font-weight: 900;
      word-break: break-word;
    }

    .summary-row span {
      color: var(--muted);
    }

    .big-button {
      width: 100%;
      min-height: 112px;
      border: 0;
      border-radius: 8px;
      padding: 20px 16px;
      color: var(--white);
      background: var(--green);
      box-shadow: 0 6px 0 var(--green-dark);
      font-size: clamp(34px, 10vw, 58px);
      line-height: 1.18;
      font-weight: 900;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="homeScreen" class="screen center active" aria-label="首页">
      <button id="startBtn" class="start-button" type="button">开始记录</button>
    </section>

    <section id="questionScreen" class="screen center" aria-label="语音问答">
      <div id="questionText" class="question">几点吃的药？</div>
      <div id="statusText" class="status">请回答</div>
    </section>

    <section id="completeScreen" class="screen center" aria-label="记录完成">
      <div id="completeText" class="status">已完成记录</div>
      <div id="syncStatus" class="sync-status">正在同步到云端</div>
      <div id="summaryBox" class="summary"></div>
      <button id="againBtn" class="big-button" type="button">再记录一次</button>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      var CONFIG = {
        elderId: "elder001",
        family_key: "family001",
        supabaseUrl: "https://xnkxxlcacgmpbmnkajmj.supabase.co",
        supabaseKey: "sb_publishable_nhxIkOeV3vyxSl2ctH6O8g_b0nz9Rz8"
      };

      var LOCAL_STORAGE_KEY = "healthVoiceRecords.supabase.v1";
      var LISTEN_TIMEOUT_MS = 8000;
      var RETRY_DELAY_MS = 1200;
      var questions = [
        { key: "medicineTime", prompt: "几点吃的药？" },
        { key: "medicineName", prompt: "吃的什么药？" },
        { key: "bloodSugarTime", prompt: "几点测的血糖？" },
        { key: "mealRelation", prompt: "血糖是饭前还是饭后测的？" },
        { key: "bloodSugarValue", prompt: "血糖是多少？" },
        { key: "bloodPressureValue", prompt: "请说血压，高压多少，低压多少？" },
        { key: "symptoms", prompt: "今天有没有不舒服？" }
      ];

      var session = null;
      var activeRecognition = null;
      var listenTimer = null;
      var retryTimer = null;
      var recognitionDone = false;
      var homeScreen = document.getElementById("homeScreen");
      var questionScreen = document.getElementById("questionScreen");
      var completeScreen = document.getElementById("completeScreen");
      var startBtn = document.getElementById("startBtn");
      var questionText = document.getElementById("questionText");
      var statusText = document.getElementById("statusText");
      var completeText = document.getElementById("completeText");
      var syncStatus = document.getElementById("syncStatus");
      var summaryBox = document.getElementById("summaryBox");
      var againBtn = document.getElementById("againBtn");

      function showScreen(name) {
        homeScreen.classList.toggle("active", name === "home");
        questionScreen.classList.toggle("active", name === "question");
        completeScreen.classList.toggle("active", name === "complete");
        window.scrollTo(0, 0);
      }

      function two(value) {
        return String(value).padStart(2, "0");
      }

      function formatDate(date) {
        return date.getFullYear() + "-" + two(date.getMonth() + 1) + "-" + two(date.getDate());
      }

      function formatTime(date) {
        return two(date.getHours()) + ":" + two(date.getMinutes());
      }

      function getLocalRecords() {
        try {
          var records = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || "[]");
          return Array.isArray(records) ? records : [];
        } catch (error) {
          return [];
        }
      }

      function saveLocalRecord(record) {
        var records = getLocalRecords();
        records.push(record);
        records.sort(function (a, b) {
          return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
        });
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(records));
      }

      function clearTimers() {
        if (listenTimer) {
          window.clearTimeout(listenTimer);
          listenTimer = null;
        }
        if (retryTimer) {
          window.clearTimeout(retryTimer);
          retryTimer = null;
        }
      }

      function stopRecognition() {
        if (activeRecognition) {
          recognitionDone = true;
          try {
            activeRecognition.abort();
          } catch (error) {
            try {
              activeRecognition.stop();
            } catch (innerError) {}
          }
          activeRecognition = null;
        }
      }

      function stopAllAudioWork() {
        clearTimers();
        stopRecognition();
        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
        }
      }

      function chooseChineseVoice() {
        if (!("speechSynthesis" in window)) return null;
        var voices = window.speechSynthesis.getVoices() || [];
        return voices.find(function (voice) {
          return /zh-CN/i.test(voice.lang) || /Chinese|Mandarin|普通话|中文/i.test(voice.name);
        }) || voices.find(function (voice) {
          return /^zh/i.test(voice.lang);
        }) || null;
      }

      function speak(text, done) {
        if (!("speechSynthesis" in window)) {
          window.setTimeout(done, 300);
          return;
        }

        window.speechSynthesis.cancel();
        var utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "zh-CN";
        utterance.rate = 0.75;
        utterance.volume = 1;
        utterance.pitch = 1;
        var voice = chooseChineseVoice();
        if (voice) utterance.voice = voice;

        var finished = false;
        var fallback = window.setTimeout(function () {
          if (finished) return;
          finished = true;
          done();
        }, Math.max(2600, text.length * 650));

        utterance.onend = function () {
          if (finished) return;
          finished = true;
          window.clearTimeout(fallback);
          done();
        };
        utterance.onerror = function () {
          if (finished) return;
          finished = true;
          window.clearTimeout(fallback);
          done();
        };
        window.speechSynthesis.speak(utterance);
      }

      function startSession() {
        stopAllAudioWork();
        session = {
          index: 0,
          answers: {},
          answersRaw: {},
          failures: {}
        };
        showScreen("question");
        askCurrentQuestion();
      }

      function askCurrentQuestion() {
        if (!session) return;
        if (session.index >= questions.length) {
          finishSession();
          return;
        }

        var question = questions[session.index];
        clearTimers();
        stopRecognition();
        questionText.textContent = question.prompt;
        statusText.textContent = "";
        statusText.classList.remove("error");
        showScreen("question");

        speak(question.prompt, function () {
          if (!session || session.index >= questions.length) return;
          statusText.textContent = "请回答";
          startListeningForAnswer();
        });
      }

      function getRecognitionConstructor() {
        return window.SpeechRecognition || window.webkitSpeechRecognition || null;
      }

      function startListeningForAnswer() {
        var Recognition = getRecognitionConstructor();
        if (!Recognition) {
          handleNoAnswer();
          return;
        }

        clearTimers();
        stopRecognition();
        recognitionDone = false;

        var recognition = new Recognition();
        activeRecognition = recognition;
        recognition.lang = "zh-CN";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.continuous = false;

        listenTimer = window.setTimeout(function () {
          handleNoAnswer();
        }, LISTEN_TIMEOUT_MS);

        recognition.onresult = function (event) {
          if (recognitionDone) return;
          recognitionDone = true;
          clearTimers();

          var text = "";
          if (event.results && event.results[0] && event.results[0][0]) {
            text = event.results[0][0].transcript || "";
          }

          if (!String(text).trim()) {
            handleNoAnswer();
            return;
          }

          activeRecognition = null;
          saveAnswer(String(text).trim());
        };

        recognition.onerror = function () {
          if (recognitionDone) return;
          recognitionDone = true;
          handleNoAnswer();
        };

        recognition.onend = function () {
          if (recognitionDone) return;
          recognitionDone = true;
          handleNoAnswer();
        };

        try {
          recognition.start();
        } catch (error) {
          handleNoAnswer();
        }
      }

      function handleNoAnswer() {
        if (!session || session.index >= questions.length) return;
        clearTimers();
        stopRecognition();

        var question = questions[session.index];
        var failCount = (session.failures[question.key] || 0) + 1;
        session.failures[question.key] = failCount;

        statusText.textContent = "没听清，请再说一遍";
        statusText.classList.add("error");
        showScreen("question");

        if (failCount >= 2) {
          session.answers[question.key] = "未记录";
          session.answersRaw[question.key] = "未记录";
          retryTimer = window.setTimeout(function () {
            session.index += 1;
            askCurrentQuestion();
          }, RETRY_DELAY_MS);
          return;
        }

        retryTimer = window.setTimeout(function () {
          askCurrentQuestion();
        }, RETRY_DELAY_MS);
      }

      function saveAnswer(text) {
        if (!session || session.index >= questions.length) return;
        var question = questions[session.index];
        session.answersRaw[question.key] = text || "未记录";

        if (question.key === "bloodPressureValue") {
          var pressure = parseBloodPressure(text);
          session.answers.systolicPressure = pressure.systolicPressure;
          session.answers.diastolicPressure = pressure.diastolicPressure;
          session.answers.bloodPressureValue = pressure.systolicPressure + "/" + pressure.diastolicPressure;
        } else {
          session.answers[question.key] = text || "未记录";
        }

        session.index += 1;
        askCurrentQuestion();
      }

      function normalizeNumberText(text) {
        return String(text || "")
          .replace(/一百/g, "100")
          .replace(/一/g, "1")
          .replace(/二/g, "2")
          .replace(/两/g, "2")
          .replace(/三/g, "3")
          .replace(/四/g, "4")
          .replace(/五/g, "5")
          .replace(/六/g, "6")
          .replace(/七/g, "7")
          .replace(/八/g, "8")
          .replace(/九/g, "9")
          .replace(/零/g, "0")
          .replace(/点/g, ".");
      }

      function parseBloodPressure(text) {
        var normalized = normalizeNumberText(text);
        var numbers = normalized.match(/\d+(?:\.\d+)?/g) || [];
        return {
          systolicPressure: numbers[0] || "未记录",
          diastolicPressure: numbers[1] || "未记录"
        };
      }

      function finishSession() {
        if (!session) return;
        stopAllAudioWork();

        var now = new Date();
        var answers = session.answers;
        var raw = session.answersRaw;
        var record = {
          elderId: CONFIG.elderId,
          family_key: CONFIG.family_key,
          recordDate: formatDate(now),
          recordTime: formatTime(now),
          medicineTime: answers.medicineTime || "未记录",
          medicineName: answers.medicineName || "未记录",
          bloodSugarTime: answers.bloodSugarTime || "未记录",
          mealRelation: answers.mealRelation || "未记录",
          bloodSugarValue: answers.bloodSugarValue || "未记录",
          systolicPressure: answers.systolicPressure || "未记录",
          diastolicPressure: answers.diastolicPressure || "未记录",
          symptoms: answers.symptoms || "未记录",
          answersRaw: {
            medicineTime: raw.medicineTime || "未记录",
            medicineName: raw.medicineName || "未记录",
            bloodSugarTime: raw.bloodSugarTime || "未记录",
            mealRelation: raw.mealRelation || "未记录",
            bloodSugarValue: raw.bloodSugarValue || "未记录",
            bloodPressureValue: raw.bloodPressureValue || "未记录",
            symptoms: raw.symptoms || "未记录"
          },
          createdAt: now.toISOString(),
          createdAtMs: now.getTime(),
          uploadStatus: "pending"
        };

        saveLocalRecord(record);
        session = null;
        renderSummary(record);
        setSyncStatus("正在同步到云端", "");
        showScreen("complete");
        uploadRecord(record);
      }

      function uploadRecord(record) {
        var sugarValue = parseNumericValue(record.bloodSugarValue);
        if (sugarValue === null) {
          setSyncStatus("血糖值未识别，已本地保存，未同步云端", "fail");
          return;
        }
        var payload = cleanPayload(toSupabaseRecord(record));
        console.log("supabase add health_records payload", payload);
        fetch(CONFIG.supabaseUrl + "/rest/v1/health_records", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": CONFIG.supabaseKey,
            "Authorization": "Bearer " + CONFIG.supabaseKey,
            "Prefer": "return=representation"
          },
          body: JSON.stringify(payload)
        }).then(function (response) {
          if (!response.ok) {
            return response.text().then(function (text) {
              throw new Error("HTTP " + response.status + " " + response.statusText + " " + text);
            });
          }
          return response.json().catch(function () {
            return [];
          });
        }).then(function () {
          setSyncStatus("云端同步成功", "success");
        }).catch(function (error) {
          setSyncStatus("已本地保存，上传失败：" + getErrorMessage(error), "fail");
        });
      }

      function toSupabaseRecord(record) {
        var sugarValue = parseNumericValue(record.bloodSugarValue);
        return {
          family_key: CONFIG.family_key,
          value: sugarValue,
          period: record.mealRelation || "未记录",
          note: JSON.stringify({
            elderId: record.elderId,
            recordDate: record.recordDate,
            recordTime: record.recordTime,
            medicineTime: record.medicineTime,
            medicineName: record.medicineName,
            bloodSugarTime: record.bloodSugarTime,
            mealRelation: record.mealRelation,
            bloodSugarValue: record.bloodSugarValue,
            systolicPressure: record.systolicPressure,
            diastolicPressure: record.diastolicPressure,
            symptoms: record.symptoms,
            answersRaw: record.answersRaw
          }),
          created_at: record.createdAt
        };
      }

      function parseNumericValue(value) {
        var text = String(value || "")
          .replace(/点/g, ".")
          .replace(/零/g, "0")
          .replace(/一/g, "1")
          .replace(/二/g, "2")
          .replace(/两/g, "2")
          .replace(/三/g, "3")
          .replace(/四/g, "4")
          .replace(/五/g, "5")
          .replace(/六/g, "6")
          .replace(/七/g, "7")
          .replace(/八/g, "8")
          .replace(/九/g, "9");
        var match = text.match(/\d+(?:\.\d+)?/);
        if (!match) return null;
        var number = Number(match[0]);
        if (!Number.isFinite(number)) return null;
        return number;
      }

      function cleanPayload(value) {
        if (Array.isArray(value)) {
          return value.map(cleanPayload).filter(function (item) {
            return item !== undefined && item !== null;
          });
        }
        if (value && typeof value === "object") {
          var output = {};
          Object.keys(value).forEach(function (key) {
            var item = cleanPayload(value[key]);
            if (item !== undefined && item !== null) output[key] = item;
          });
          return output;
        }
        return value;
      }

      function setSyncStatus(text, state) {
        syncStatus.textContent = text;
        syncStatus.classList.remove("success", "fail");
        if (state) syncStatus.classList.add(state);
      }

      function getErrorMessage(error) {
        if (!error) return "未知错误";
        if (typeof error === "string") return error;
        return error.message || error.errMsg || JSON.stringify(error);
      }

      function renderSummary(record) {
        summaryBox.innerHTML = "";
        [
          ["吃药时间", record.medicineTime],
          ["药物", record.medicineName],
          ["测糖时间", record.bloodSugarTime],
          ["饭前/饭后", record.mealRelation],
          ["血糖", record.bloodSugarValue],
          ["高压", record.systolicPressure],
          ["低压", record.diastolicPressure],
          ["不舒服", record.symptoms]
        ].forEach(function (item) {
          var row = document.createElement("div");
          row.className = "summary-row";
          row.innerHTML = "<span>" + item[0] + "：</span>" + escapeHtml(item[1]);
          summaryBox.appendChild(row);
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      startBtn.addEventListener("click", startSession);
      againBtn.addEventListener("click", startSession);

      if ("speechSynthesis" in window) {
        window.speechSynthesis.onvoiceschanged = chooseChineseVoice;
      }

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("service-worker.js").catch(function () {});
        });
      }
    })();
  </script>
</body>
</html>
