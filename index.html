<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6b3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="血糖记录">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>血糖记录</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #fffdf2;
      --text: #101010;
      --muted: #4b4b4b;
      --green: #0b6b3a;
      --green-dark: #084e2b;
      --line: #d0d0d0;
      --red: #c51616;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 26px;
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    .screen.active {
      display: flex;
    }

    .center {
      justify-content: center;
      gap: 28px;
      text-align: center;
    }

    .home-screen {
      gap: 22px;
    }

    .home-header {
      padding: 18px;
      border-radius: 8px;
      background: var(--green);
      color: var(--white);
      border: 4px solid var(--green-dark);
    }

    .home-title {
      margin: 0;
      font-size: clamp(46px, 13vw, 76px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
    }

    .home-subtitle {
      margin-top: 10px;
      font-size: clamp(24px, 7vw, 38px);
      line-height: 1.22;
      font-weight: 900;
    }

    .home-date {
      margin-top: 14px;
      font-size: clamp(22px, 6vw, 32px);
      line-height: 1.2;
      font-weight: 900;
      color: #eef8ee;
    }

    .start-button {
      width: 100%;
      min-height: 112px;
      border: 0;
      border-radius: 10px;
      padding: 22px 18px;
      background: var(--green);
      color: var(--white);
      box-shadow: 0 9px 0 var(--green-dark);
      font-size: clamp(36px, 10vw, 58px);
      line-height: 1.14;
      font-weight: 900;
      letter-spacing: 0;
      touch-action: manipulation;
    }

    .start-button:active,
    .big-button:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 var(--green-dark);
    }

    .question {
      color: var(--green-dark);
      font-size: clamp(48px, 15vw, 88px);
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: 0;
    }

    .status {
      color: var(--green-dark);
      font-size: clamp(44px, 14vw, 78px);
      line-height: 1.16;
      font-weight: 900;
    }

    .status.error {
      color: var(--red);
    }

    .sync-status {
      color: var(--muted);
      font-size: clamp(30px, 8vw, 46px);
      line-height: 1.2;
      font-weight: 900;
    }

    .sync-status.success {
      color: var(--green-dark);
    }

    .sync-status.fail {
      color: var(--red);
    }

    .summary {
      display: grid;
      gap: 12px;
      background: var(--white);
      border: 4px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      text-align: left;
    }

    .summary-row {
      font-size: clamp(27px, 7vw, 40px);
      line-height: 1.24;
      font-weight: 900;
      word-break: break-word;
    }

    .summary-row span {
      color: var(--muted);
    }

    .big-button {
      width: 100%;
      min-height: 112px;
      border: 0;
      border-radius: 8px;
      padding: 20px 16px;
      color: var(--white);
      background: var(--green);
      box-shadow: 0 6px 0 var(--green-dark);
      font-size: clamp(34px, 10vw, 58px);
      line-height: 1.18;
      font-weight: 900;
      touch-action: manipulation;
    }

    .home-actions {
      display: grid;
      gap: 18px;
      width: 100%;
    }

    .feature-grid {
      display: grid;
      gap: 18px;
    }

    .health-card {
      display: grid;
      gap: 16px;
      padding: 20px;
      border-radius: 8px;
      border: 4px solid var(--line);
      background: var(--white);
      box-shadow: 0 6px 0 rgba(8, 78, 43, 0.16);
    }

    .health-card.record-card {
      border-color: #f0b8b8;
      background: #fff7f7;
    }

    .health-card.recipe-card-home {
      border-color: #b7d7a8;
      background: #f7fff4;
    }

    .health-card-top {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 16px;
      align-items: center;
    }

    .home-illustration {
      width: 112px;
      height: 112px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      border: 4px solid currentColor;
      font-size: 62px;
      background: var(--white);
    }

    .record-card .home-illustration {
      color: #b31321;
      background: #ffe9e9;
    }

    .recipe-card-home .home-illustration {
      color: var(--green-dark);
      background: #ecf8df;
    }

    .feature-title {
      color: var(--text);
      font-size: clamp(34px, 10vw, 56px);
      line-height: 1.1;
      font-weight: 900;
    }

    .feature-desc {
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(23px, 6.5vw, 34px);
      line-height: 1.25;
      font-weight: 900;
    }

    .recipe-button {
      background: #c85f14;
      box-shadow: 0 6px 0 #7a3509;
    }

    .more-panel {
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 8px;
      border: 4px solid var(--line);
      background: var(--white);
    }

    .more-title {
      color: var(--green-dark);
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.15;
      font-weight: 900;
    }

    .more-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .more-item {
      display: grid;
      gap: 6px;
      min-height: 112px;
      padding: 14px;
      border-radius: 8px;
      border: 3px solid var(--line);
      background: #fafafa;
      color: var(--text);
      text-decoration: none;
    }

    .more-item strong {
      font-size: clamp(23px, 6vw, 34px);
      line-height: 1.15;
      font-weight: 900;
    }

    .more-item span {
      color: var(--muted);
      font-size: clamp(18px, 5vw, 26px);
      line-height: 1.2;
      font-weight: 800;
    }

    .recipe-preview,
    .recipe-card,
    .meal-section {
      background: var(--white);
      border: 4px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      text-align: left;
    }

    .recipe-preview {
      font-size: clamp(28px, 8vw, 44px);
      line-height: 1.22;
      font-weight: 900;
      color: var(--green-dark);
    }

    .recipe-title {
      color: var(--green-dark);
      font-size: clamp(38px, 11vw, 62px);
      line-height: 1.12;
      font-weight: 900;
      text-align: center;
    }

    .recipe-list {
      display: grid;
      gap: 18px;
    }

    .meal-section {
      display: grid;
      gap: 14px;
    }

    .meal-title {
      color: var(--green-dark);
      font-size: clamp(34px, 10vw, 54px);
      line-height: 1.12;
      font-weight: 900;
    }

    .dish-grid {
      display: grid;
      gap: 12px;
    }

    .recipe-card {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 14px;
      align-items: center;
      padding: 14px;
      width: 100%;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .food-art {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #f1f8e9;
      border: 4px solid #b7d7a8;
      font-size: 44px;
    }

    .dish-name {
      color: var(--text);
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.14;
      font-weight: 900;
    }

    .dish-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: clamp(22px, 6vw, 32px);
      line-height: 1.22;
      font-weight: 800;
    }

    .recipe-actions {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }

    .dish-detail-hero,
    .detail-block {
      background: var(--white);
      border: 4px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    .dish-detail-hero {
      display: grid;
      gap: 16px;
      justify-items: center;
      text-align: center;
    }

    .detail-art {
      width: 148px;
      height: 148px;
      font-size: 78px;
    }

    .detail-block {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .detail-text,
    .detail-list {
      color: var(--text);
      font-size: clamp(27px, 7vw, 40px);
      line-height: 1.35;
      font-weight: 900;
    }

    .detail-list {
      margin: 0;
      padding-left: 1.35em;
    }

    .detail-list li {
      margin: 10px 0;
    }

    .home-screen {
      gap: 20px;
      padding-bottom: 10px;
      background:
        radial-gradient(circle at 88% 7%, rgba(183, 215, 168, 0.42), transparent 24%),
        radial-gradient(circle at 12% 18%, rgba(255, 248, 218, 0.95), transparent 34%);
    }

    .home-header {
      position: relative;
      overflow: hidden;
      display: grid;
      gap: 14px;
      min-height: 260px;
      padding: 24px 22px;
      border: 0;
      border-radius: 0 0 28px 28px;
      background: linear-gradient(135deg, #f7fbec 0%, #edf8df 54%, #fff8e7 100%);
      color: var(--text);
    }

    .home-header::after {
      content: "👴🏻👵🏻";
      position: absolute;
      right: 18px;
      bottom: 16px;
      width: 188px;
      height: 138px;
      display: grid;
      place-items: center;
      border-radius: 44% 56% 50% 50%;
      background: rgba(255, 255, 255, 0.54);
      font-size: 86px;
      line-height: 1;
    }

    .home-title,
    .home-subtitle,
    .home-date,
    .home-tip {
      position: relative;
      z-index: 1;
      max-width: calc(100% - 160px);
    }

    .home-title {
      color: #075f34;
      text-shadow: 0 3px 0 rgba(7, 95, 52, 0.1);
    }

    .home-subtitle {
      color: #1f1f1f;
      margin-top: 0;
    }

    .home-date {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: calc(100% - 160px);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid #dcebcf;
      color: #272727;
      box-shadow: 0 4px 16px rgba(8, 78, 43, 0.08);
    }

    .home-tip {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #138347;
      font-size: clamp(22px, 6vw, 34px);
      line-height: 1.25;
      font-weight: 900;
    }

    .feature-grid {
      grid-template-columns: 1fr;
    }

    .health-card {
      border: 2px solid #d8ecd4;
      border-radius: 26px;
      box-shadow: 0 12px 30px rgba(8, 78, 43, 0.12);
    }

    .health-card.record-card {
      border-color: #cde9da;
      background: linear-gradient(145deg, #ffffff 0%, #f8fffb 100%);
    }

    .health-card.recipe-card-home {
      border-color: #f3d2aa;
      background: linear-gradient(145deg, #fffdf8 0%, #fff8ed 100%);
    }

    .health-card-top {
      grid-template-columns: 118px 1fr;
    }

    .home-illustration {
      border: 0;
      border-radius: 30px;
      box-shadow: inset 0 -8px 18px rgba(255, 255, 255, 0.5), 0 10px 18px rgba(0, 0, 0, 0.08);
    }

    .record-card .home-illustration {
      color: #d91f27;
      background: linear-gradient(145deg, #fff2f2, #ffe0e0);
    }

    .recipe-card-home .home-illustration {
      color: #ec6a10;
      background: linear-gradient(145deg, #fff4dc, #ffe4bd);
    }

    .feature-title {
      color: #075f34;
    }

    .recipe-card-home .feature-title {
      color: #e9620f;
    }

    .start-button,
    .recipe-button {
      border-radius: 999px;
      min-height: 104px;
    }

    .recipe-button {
      background: linear-gradient(135deg, #ff8a1a, #ee610b);
      box-shadow: 0 7px 0 #9a3c05;
    }

    .more-panel {
      border: 0;
      border-radius: 24px;
      background: transparent;
      padding: 0;
    }

    .more-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #0b7c42;
    }

    .more-grid {
      grid-template-columns: 1fr 1fr;
    }

    .more-item {
      min-height: 148px;
      justify-items: center;
      text-align: center;
      border-width: 2px;
      border-radius: 22px;
      box-shadow: 0 8px 22px rgba(8, 78, 43, 0.08);
    }

    .more-icon {
      font-size: 50px;
      line-height: 1;
    }

    .voice-tip-bar {
      display: grid;
      grid-template-columns: 64px 1fr 54px;
      gap: 14px;
      align-items: center;
      padding: 18px;
      border-radius: 24px;
      background: #eef8e8;
      color: #0d5f36;
      font-size: clamp(21px, 5.8vw, 32px);
      line-height: 1.3;
      font-weight: 900;
      box-shadow: 0 8px 22px rgba(8, 78, 43, 0.08);
    }

    .voice-tip-icon,
    .voice-wave {
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #d7efce;
      font-size: 30px;
    }

    .voice-wave {
      color: #72bb62;
      background: transparent;
      font-size: 40px;
    }

    .bottom-nav {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      align-items: end;
      min-height: 98px;
      padding: 12px 10px 10px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.08);
    }

    .nav-item {
      display: grid;
      gap: 4px;
      justify-items: center;
      color: #777;
      font-size: 18px;
      line-height: 1.1;
      font-weight: 900;
    }

    .nav-icon {
      font-size: 30px;
      line-height: 1;
    }

    .nav-item.active {
      color: #0b7c42;
    }

    .nav-item.voice-main .nav-icon {
      width: 68px;
      height: 68px;
      display: grid;
      place-items: center;
      margin-top: -34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #78c85b, #2ea84d);
      color: #ffffff;
      box-shadow: 0 10px 18px rgba(46, 168, 77, 0.32);
      font-size: 38px;
    }

    @media (min-width: 680px) {
      .feature-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 420px) {
      .home-header {
        min-height: 238px;
        padding: 20px 18px;
      }

      .home-header::after {
        right: 4px;
        width: 150px;
        font-size: 70px;
      }

      .home-title,
      .home-subtitle,
      .home-date,
      .home-tip {
        max-width: calc(100% - 118px);
      }

      .health-card-top {
        grid-template-columns: 96px 1fr;
      }

      .home-illustration {
        width: 96px;
        height: 96px;
        font-size: 54px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="homeScreen" class="screen home-screen active" aria-label="首页">
      <header class="home-header">
        <h1 class="home-title">血糖记录</h1>
        <div class="home-subtitle">语音记录血压血糖和用药</div>
        <div id="homeTodayDate" class="home-date">今日</div>
        <div class="home-tip">
          <span aria-hidden="true">🔊</span>
          <span>今天也要好好照顾自己哦！</span>
        </div>
      </header>

      <div class="feature-grid">
        <section class="health-card record-card" aria-label="血糖记录">
          <div class="health-card-top">
            <div class="home-illustration" aria-hidden="true">🩸📟</div>
            <div>
              <div class="feature-title">血糖记录</div>
              <div class="feature-desc">点一下，说血压、血糖和用药</div>
            </div>
          </div>
          <button id="startBtn" class="start-button" type="button">开始记录</button>
        </section>

        <section class="health-card recipe-card-home" aria-label="今日食谱">
          <div class="health-card-top">
            <div class="home-illustration" aria-hidden="true">🍲🥬</div>
            <div>
              <div class="feature-title">今日食谱</div>
              <div id="todayRecipePreview" class="feature-desc">推荐适合控糖的家常饭菜</div>
            </div>
          </div>
          <button id="recipeBtn" class="big-button recipe-button" type="button">查看食谱</button>
        </section>
      </div>

      <section class="more-panel" aria-label="更多功能">
        <div class="more-title"><span aria-hidden="true">▦</span> 更多功能</div>
        <div class="more-grid">
          <div class="more-item">
            <div class="more-icon" aria-hidden="true">🌙</div>
            <strong>睡眠监测</strong>
            <span>暂未开放</span>
          </div>
          <div class="more-item">
            <div class="more-icon" aria-hidden="true">💊</div>
            <strong>用药提醒</strong>
            <span>暂未开放</span>
          </div>
          <a class="more-item" href="family.html">
            <div class="more-icon" aria-hidden="true">📋</div>
            <strong>历史记录</strong>
            <span>查看记录</span>
          </a>
          <a class="more-item" href="family.html">
            <div class="more-icon" aria-hidden="true">👪</div>
            <strong>家属查看</strong>
            <span>远程查看</span>
          </a>
        </div>
      </section>

      <div class="voice-tip-bar" aria-label="语音小提示">
        <div class="voice-tip-icon" aria-hidden="true">🔊</div>
        <div>语音小提示：点击“开始记录”按钮，然后说出您的血压、血糖和用药情况</div>
        <div class="voice-wave" aria-hidden="true">▥</div>
      </div>

      <nav class="bottom-nav" aria-label="底部导航展示">
        <div class="nav-item active">
          <div class="nav-icon" aria-hidden="true">🏠</div>
          <div>首页</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon" aria-hidden="true">🕘</div>
          <div>记录</div>
        </div>
        <div class="nav-item voice-main">
          <div class="nav-icon" aria-hidden="true">🎙️</div>
          <div>语音记录</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon" aria-hidden="true">📊</div>
          <div>趋势</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon" aria-hidden="true">👤</div>
          <div>我的</div>
        </div>
      </nav>
    </section>

    <section id="questionScreen" class="screen center" aria-label="语音问答">
      <div id="questionText" class="question">正在听，请说血糖</div>
      <div id="statusText" class="status"></div>
    </section>

    <section id="completeScreen" class="screen center" aria-label="记录完成">
      <div id="completeText" class="status">已完成记录</div>
      <div id="syncStatus" class="sync-status">正在同步到云端</div>
      <div id="summaryBox" class="summary"></div>
      <button id="againBtn" class="big-button" type="button">再记录一次</button>
    </section>

    <section id="recipeScreen" class="screen" aria-label="今日食谱推荐">
      <div id="recipeTitle" class="recipe-title">今日食谱推荐</div>
      <div id="recipeList" class="recipe-list"></div>
      <div class="recipe-actions">
        <button id="backHomeBtn" class="big-button" type="button">返回首页</button>
      </div>
    </section>

    <section id="dishScreen" class="screen" aria-label="菜品详情">
      <div id="dishDetailTitle" class="recipe-title">菜品详情</div>
      <div class="dish-detail-hero">
        <div id="dishDetailIcon" class="food-art detail-art">🍽️</div>
        <div id="dishDetailNote" class="dish-note"></div>
      </div>
      <div class="detail-block">

      function getRecognitionConstructor() {
        return window.SpeechRecognition || window.webkitSpeechRecognition || null;
      }

      function speakPrompt(text, done) {
        if (!("speechSynthesis" in window)) {
          window.setTimeout(done, 300);
          return;
        }
        window.speechSynthesis.cancel();
        var utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "zh-CN";
        utterance.rate = 0.75;
        utterance.volume = 1;
        utterance.pitch = 1;
        var voice = chooseChineseVoice();
        if (voice) utterance.voice = voice;
        var finished = false;
        var fallback = window.setTimeout(function () {
          if (finished) return;
          finished = true;
          done();
        }, Math.max(2400, text.length * 520));
        utterance.onend = function () {
          if (finished) return;
          finished = true;
          window.clearTimeout(fallback);
          done();
        };
        utterance.onerror = function () {
          if (finished) return;
          finished = true;
          window.clearTimeout(fallback);
          done();
        };
        window.speechSynthesis.speak(utterance);
      }

      function chooseChineseVoice() {
        if (!("speechSynthesis" in window)) return null;
        var voices = window.speechSynthesis.getVoices() || [];
        return voices.find(function (voice) {
          return /zh-CN/i.test(voice.lang) || /Chinese|Mandarin|普通话|中文/i.test(voice.name);
        }) || voices.find(function (voice) {
          return /^zh/i.test(voice.lang);
        }) || null;
      }

      function listenForStep(step, isStartRetry) {
        var nativeSpeech = getNativeSpeechRecognition();
        if (nativeSpeech) {
          listenForStepNative(step, nativeSpeech);
          return;
        }

        var Recognition = getRecognitionConstructor();
        if (!Recognition) {
          handleStepNoAnswer(step);
          return;
        }

        clearTimers();
        stopRecognition();
        recognitionDone = false;

        var recognition = new Recognition();
        activeRecognition = recognition;
        var listenStarted = false;
        recognition.lang = "zh-CN";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.continuous = false;

        var startCheckTimer = window.setTimeout(function () {
          if (listenStarted || recognitionDone || isStartRetry) return;
          try {
            recognition.abort();
          } catch (error) {}
          activeRecognition = null;
          window.setTimeout(function () {
            if (!session) return;
            listenForStep(step, true);
          }, RECOGNITION_RETRY_DELAY_MS);
        }, RECOGNITION_RETRY_DELAY_MS);

        recognition.onstart = function () {
          listenStarted = true;
          window.clearTimeout(startCheckTimer);
          listenTimer = window.setTimeout(function () {
            handleStepNoAnswer(step);
          }, LISTEN_TIMEOUT_MS);
        };

        recognition.onresult = function (event) {
          if (recognitionDone) return;
          recognitionDone = true;
          window.clearTimeout(startCheckTimer);
          clearTimers();

          var text = "";
          if (event.results && event.results[0] && event.results[0][0]) {
            text = event.results[0][0].transcript || "";
          }

          if (!String(text).trim()) {
            handleStepNoAnswer(step);
            return;
          }

          activeRecognition = null;
          saveStepAnswer(step, String(text).trim());
        };

        recognition.onerror = function () {
          if (recognitionDone) return;
          recognitionDone = true;
          window.clearTimeout(startCheckTimer);
          if (!listenStarted && !isStartRetry) {
            activeRecognition = null;
            window.setTimeout(function () {
              if (!session) return;
              listenForStep(step, true);
            }, RECOGNITION_RETRY_DELAY_MS);
            return;
          }
          handleStepNoAnswer(step);
        };

        recognition.onend = function () {
          if (recognitionDone) return;
          recognitionDone = true;
          window.clearTimeout(startCheckTimer);
          if (!listenStarted && !isStartRetry) {
            activeRecognition = null;
            window.setTimeout(function () {
              if (!session) return;
              listenForStep(step, true);
            }, RECOGNITION_RETRY_DELAY_MS);
            return;
          }
          handleStepNoAnswer(step);
        };

        try {
          recognition.start();
        } catch (error) {
          window.clearTimeout(startCheckTimer);
          if (!isStartRetry) {
            activeRecognition = null;
            window.setTimeout(function () {
              if (!session) return;
              listenForStep(step, true);
            }, RECOGNITION_RETRY_DELAY_MS);
            return;
          }
          handleStepNoAnswer(step);
        }

      function getNativeSpeechRecognition() {
        if (!window.Capacitor || !window.Capacitor.Plugins) return null;
        return window.Capacitor.Plugins.SpeechRecognition || null;
      }

      function listenForStepNative(step, nativeSpeech) {
        clearTimers();
        stopRecognition();
        recognitionDone = false;

        Promise.resolve()
          .then(function () {
            if (nativeSpeech.available) return nativeSpeech.available();
            return { available: true };
          })
          .then(function (result) {
            if (result && result.available === false) throw new Error("语音识别不可用");
            if (nativeSpeech.requestPermissions) return nativeSpeech.requestPermissions();
            return null;
          })
          .then(function () {
            listenTimer = window.setTimeout(function () {
              handleStepNoAnswer(step);
            }, LISTEN_TIMEOUT_MS);
            return nativeSpeech.start({
              language: "zh-CN",
              maxResults: 1,
              partialResults: false,
              popup: false,
              prompt: step.prompt
            });
          })
          .then(function (result) {
            if (recognitionDone) return;
            recognitionDone = true;
            clearTimers();
            var text = "";
            if (result && Array.isArray(result.matches) && result.matches.length) {
              text = result.matches[0] || "";
            }
            if (!String(text).trim()) {
              handleStepNoAnswer(step);
              return;
            }
            saveStepAnswer(step, String(text).trim());
          })
          .catch(function () {
            if (recognitionDone) return;
            recognitionDone = true;
            clearTimers();
            handleStepNoAnswer(step);
          });
      }

      function handleStepNoAnswer(step) {
        if (!session) return;

        stopRecognition();

        var failCount = (session.failures[step.key] || 0) + 1;
        session.failures[step.key] = failCount;

            window.setTimeout(function () {
              if (!session) return;
              listenForStep(step, false);
            }, RECOGNITION_START_DELAY_MS);
            return;
          }
          session.answers[step.key] = "未记录";
          session.index += 1;
          runCurrentStep();
        });
      }

      function saveStepAnswer(step, text) {
        if (!session) return;
        session.answers[step.key] = dedupeRecognizedText(text) || "未记录";
        session.index += 1;
        runCurrentStep();

      function normalizeNumberText(text) {
        return String(text || "")
          .replace(/一百/g, "100")
          .replace(/一/g, "1")
          .replace(/二/g, "2")
          .replace(/两/g, "2")
          .replace(/三/g, "3")
          .replace(/四/g, "4")
          .replace(/五/g, "5")
          .replace(/六/g, "6")
          .replace(/七/g, "7")
          .replace(/八/g, "8")
          .replace(/九/g, "9")
          .replace(/零/g, "0")
          .replace(/点/g, ".");
      }

      function parseBloodPressure(text) {
        var normalized = normalizeNumberText(text);
        var numbers = normalized.match(/\d+(?:\.\d+)?/g) || [];
        return {
          systolicPressure: numbers[0] || "未记录",
          diastolicPressure: numbers[1] || "未记录"
        };
      }

          medicineName: medicineText,
          medicineCount: medicineCount,
          bloodSugarTime: "未记录",
          mealRelation: period,
          bloodSugarValue: sugarValue === null ? "未记录" : String(sugarValue),
          systolicPressure: pressure.systolicPressure,
          diastolicPressure: pressure.diastolicPressure,
          symptoms: "未记录",
          answersRaw: {
            bloodPressure: pressureText,
            bloodSugar: sugarText,
            medicine: medicineText
          },
          createdAt: now.toISOString(),
          createdAtMs: now.getTime(),
          uploadStatus: "pending"
        };

        saveLocalRecord(record);
        session = null;
        renderSummary(record);
        setSyncStatus("正在同步到云端", "");
        showScreen("complete");
        uploadRecord(record);
        speakPrompt("已保存", function () {});
      }

      function dedupeRecognizedText(text) {
        var value = String(text || "").replace(/\s+/g, "").trim();
        if (!value) return "";
        if (value.length % 2 === 0) {
          var half = value.length / 2;
          if (value.slice(0, half) === value.slice(half)) return value.slice(0, half);
        }
        var best = value;
        for (var size = 3; size <= Math.floor(value.length / 2); size += 1) {
          var part = value.slice(0, size);
          if (part && value === part.repeat(Math.floor(value.length / size)) && value.length % size === 0) {
            best = part;
            break;
          }
        }
        return best;
      }

      function parsePeriod(text) {
        var value = String(text || "");
        if (/空腹/.test(value)) return "空腹";
        if (/饭前|餐前/.test(value)) return "饭前";
        if (/饭后|餐后/.test(value)) return "饭后";
        if (/睡前/.test(value)) return "睡前";
        return "随机";
      }

      function parseMedicineCount(text) {
        var normalized = normalizeNumberText(text);
        var match = normalized.match(/(\d+(?:\.\d+)?)\s*片/);
        return match ? match[1] : "未记录";
      }

      function uploadRecord(record) {
        var payload = cleanPayload(toSupabaseRecord(record));
        console.log("supabase add health_records payload", payload);
        fetch(CONFIG.supabaseUrl + "/rest/v1/health_records", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": CONFIG.supabaseKey,
            "Authorization": "Bearer " + CONFIG.supabaseKey,
            "Prefer": "return=representation"
          },
          body: JSON.stringify(payload)
        }).then(function (response) {
          if (!response.ok) {
            return response.text().then(function (text) {
              throw new Error("HTTP " + response.status + " " + response.statusText + " " + text);
            });
          }
          return response.json().catch(function () {
            return [];
          });
        }).then(function () {
          setSyncStatus("云端同步成功", "success");
        }).catch(function (error) {
          setSyncStatus("已本地保存，上传失败：" + getErrorMessage(error), "fail");
        });
      }

      function toSupabaseRecord(record) {
        var sugarValue = parseNumericValue(record.bloodSugarValue);
        return {
          family_key: CONFIG.family_key,
          value: sugarValue,
          period: record.mealRelation || "随机",
          note: JSON.stringify({
            elderId: record.elderId,
            recordDate: record.recordDate,
            recordTime: record.recordTime,
            medicineTime: record.medicineTime,
            medicineName: record.medicineName,
            medicineCount: record.medicineCount,
            bloodSugarTime: record.bloodSugarTime,
            mealRelation: record.mealRelation,
            bloodSugarValue: record.bloodSugarValue,
            systolicPressure: record.systolicPressure,
            diastolicPressure: record.diastolicPressure,
            answersRaw: record.answersRaw
          }),
          created_at: record.createdAt
        };
      }

      function parseNumericValue(value) {
        var text = String(value || "")
          .replace(/点/g, ".")
          .replace(/零/g, "0")
          .replace(/一/g, "1")
          .replace(/二/g, "2")
          .replace(/两/g, "2")
          .replace(/三/g, "3")
          .replace(/四/g, "4")
          .replace(/五/g, "5")
          .replace(/六/g, "6")
          .replace(/七/g, "7")
          .replace(/八/g, "8")
          .replace(/九/g, "9");
        var match = text.match(/\d+(?:\.\d+)?/);
        if (!match) return null;
        var number = Number(match[0]);
        if (!Number.isFinite(number)) return null;
        return number;
      }

      function cleanPayload(value) {
        if (Array.isArray(value)) {
          return value.map(cleanPayload).filter(function (item) {
            return item !== undefined && item !== null;
          });
        }
        if (value && typeof value === "object") {
          var output = {};
          Object.keys(value).forEach(function (key) {
            var item = cleanPayload(value[key]);
            if (item !== undefined && item !== null) output[key] = item;
          });
          return output;
        }
        return value;
      }

      function setSyncStatus(text, state) {
        syncStatus.textContent = text;
        syncStatus.classList.remove("success", "fail");
        if (state) syncStatus.classList.add(state);
      }

      function getErrorMessage(error) {
        if (!error) return "未知错误";
        if (typeof error === "string") return error;
        return error.message || error.errMsg || JSON.stringify(error);
      }

      function renderSummary(record) {
        summaryBox.innerHTML = "";
        [
          ["吃药时间", record.medicineTime],
          ["药物", record.medicineName],
          ["药量", record.medicineCount],
          ["测糖时间", record.bloodSugarTime],
          ["时段", record.mealRelation],
          ["血糖", record.bloodSugarValue],
          ["高压", record.systolicPressure],
          ["低压", record.diastolicPressure]
        ].forEach(function (item) {
          var row = document.createElement("div");
          row.className = "summary-row";
          row.innerHTML = "<span>" + item[0] + "：</span>" + escapeHtml(item[1]);
          summaryBox.appendChild(row);
        });
      }

      function dish(name, note, icon) {
        return {
          name: name,
          note: note,
          icon: icon,
          ingredients: getDefaultIngredients(name),
          steps: getDefaultSteps(name),
          tips: "少油少盐，不放糖。主食要定量，蔬菜可以多一些，按平时医嘱用药。"
        };
      }

      function getDefaultIngredients(name) {
        if (/鱼|鲈鱼/.test(name)) return "鱼一小份、姜丝、葱、少量酱油。";
        if (/鸡|鸡胸|鸡腿/.test(name)) return "去皮鸡肉一小份、青菜、姜片、少量盐。";
        if (/豆腐|豆干|豆浆|豆腐脑/.test(name)) return "豆腐或豆制品一小份、青菜、葱花、少量盐。";
        if (/蛋|鸡蛋/.test(name)) return "鸡蛋一个、番茄或绿叶菜、少量植物油。";
        if (/粥|饭|馒头|窝头|玉米|红薯|南瓜|杂粮/.test(name)) return "主食一小份、搭配鸡蛋或豆制品、绿叶菜。";
        if (/汤/.test(name)) return "新鲜蔬菜、少量瘦肉或豆腐、清水、少量盐。";
        if (/木耳|菠菜|白菜|油麦菜|小白菜|莴笋|西兰花|冬瓜|黄瓜|番茄|芹菜|苦瓜|生菜|茄子|丝瓜|青菜|蔬菜/.test(name)) return "新鲜蔬菜一盘、蒜末少量、植物油少量、盐少量。";
        if (/杏仁|毛豆|梨|苹果|坚果/.test(name)) return "加餐一小份，按血糖情况少量食用。";
        return "新鲜食材一小份、绿叶菜、少量植物油、少量盐。";
      }

      function getDefaultSteps(name) {
        if (/凉拌|拌/.test(name)) {
          return ["食材洗净，能焯水的先焯水。", "放少量盐和少量油拌匀。", "不要加糖，主食另外定量。"];
        }
        if (/清蒸|蒸/.test(name)) {
          return ["食材洗净处理好。", "上锅清蒸到熟透。", "出锅后少量调味，不要放糖。"];
        }
        if (/汤|炖/.test(name)) {
          return ["食材洗净切好。", "加清水煮熟或炖熟。", "最后少盐调味，少喝油汤。"];
        }
        if (/粥|饭|馒头|窝头|玉米|红薯|南瓜|杂粮/.test(name)) {
          return ["按一小份准备主食。", "搭配蔬菜和优质蛋白一起吃。", "吃完观察血糖，不要再额外加甜食。"];
        }
        return ["食材洗净切好。", "锅里少放油，炒熟或煮熟。", "少盐调味，不放糖，趁温热食用。"];
      }

      function getTodayRecipe() {
        var now = new Date();
        var start = new Date(now.getFullYear(), 0, 0);
        var dayOfYear = Math.floor((now - start) / 86400000);
        return weeklyRecipes[dayOfYear % weeklyRecipes.length];
      }

      function getMealLabel(key) {
        if (key === "breakfast") return "早餐";
        if (key === "lunch") return "午餐";
        if (key === "dinner") return "晚餐";
        return "加餐";
      }

      function renderRecipePreview() {
        var recipe = getTodayRecipe();
        todayRecipePreview.textContent = "推荐适合控糖的家常饭菜：" + recipe.breakfast[0].name + "、" + recipe.lunch[0].name + "、" + recipe.dinner[0].name;
      }

      function showTodayRecipe() {
        stopAllAudioWork();
        currentRecipe = getTodayRecipe();
        renderRecipe(currentRecipe);
        showScreen("recipe");
      }

      function renderRecipe(recipe) {
        recipeTitle.textContent = "今日食谱推荐";
        recipeList.innerHTML = "";
        ["breakfast", "lunch", "dinner", "snack"].forEach(function (mealKey) {
          var section = document.createElement("section");
          section.className = "meal-section";

          var title = document.createElement("div");
          title.className = "meal-title";
          title.textContent = getMealLabel(mealKey);
          section.appendChild(title);

          var grid = document.createElement("div");
          grid.className = "dish-grid";
          recipe[mealKey].forEach(function (item) {
            grid.appendChild(createDishCard(item));
          });
          section.appendChild(grid);
          recipeList.appendChild(section);
        });
      }

      function createDishCard(item) {
        var card = document.createElement("button");
        card.className = "recipe-card";
        card.type = "button";
        card.setAttribute("aria-label", "查看" + item.name + "做法");
        card.addEventListener("click", function () {
          showDishDetail(item);
        });

        var art = document.createElement("div");
        art.className = "food-art";
        art.textContent = item.icon;

        var content = document.createElement("div");
        var name = document.createElement("div");
        name.className = "dish-name";
        name.textContent = item.name;
        var note = document.createElement("div");
        note.className = "dish-note";
        note.textContent = item.note;

        content.appendChild(name);
        content.appendChild(note);
        card.appendChild(art);
        card.appendChild(content);
        return card;
      }

      function showDishDetail(item) {
        stopAllAudioWork();
        currentDish = item;
        dishDetailTitle.textContent = item.name;
        dishDetailIcon.textContent = item.icon;
        dishDetailNote.textContent = item.note;
        dishIngredients.textContent = item.ingredients || "未记录";
        dishTips.textContent = item.tips || "少油少盐，主食定量。";
        dishSteps.innerHTML = "";
        (item.steps || []).forEach(function (step) {
          var li = document.createElement("li");
          li.textContent = step;
          dishSteps.appendChild(li);
        });
        showScreen("dish");
      }

      function speakDish(item) {
        var text = item.name + "。食材：" + (item.ingredients || "按家常少量准备") +
          "。做法：" + (item.steps || []).join("。") +
          "。注意少油少盐，主食定量。";
        speakPrompt(text, function () {});
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      startBtn.addEventListener("click", startSession);
      againBtn.addEventListener("click", startSession);
      recipeBtn.addEventListener("click", showTodayRecipe);
      backHomeBtn.addEventListener("click", function () {
        stopAllAudioWork();
        showScreen("home");
      });
      readDishBtn.addEventListener("click", function () {
        if (currentDish) speakDish(currentDish);
      });
      backRecipeBtn.addEventListener("click", function () {
        stopAllAudioWork();
        if (!currentRecipe) currentRecipe = getTodayRecipe();
        renderRecipe(currentRecipe);
        showScreen("recipe");
      });
      dishHomeBtn.addEventListener("click", function () {
        stopAllAudioWork();
        showScreen("home");
      });

      renderHomeDate();
      renderRecipePreview();

      if ("speechSynthesis" in window) {
        window.speechSynthesis.onvoiceschanged = chooseChineseVoice;
      }

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("service-worker.js").catch(function () {});
        });
      }
    })();
  </script>
</body>
