<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6b3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="血糖记录">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>血糖记录</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #fffdf2;
      --text: #101010;
      --muted: #4b4b4b;
      --green: #0b6b3a;
      --green-dark: #084e2b;
      --line: #cfcfcf;
      --red: #c51616;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 26px;
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    .screen.active {
      display: flex;
    }

    .center {
      justify-content: center;
      gap: 28px;
      text-align: center;
    }

    .start-button {
      width: 100%;
      min-height: 78vh;
      border: 0;
      border-radius: 10px;
      padding: 28px 20px;
      background: var(--green);
      color: var(--white);
      box-shadow: 0 9px 0 var(--green-dark);
      font-size: clamp(56px, 17vw, 96px);
      line-height: 1.14;
      font-weight: 900;
      letter-spacing: 0;
      touch-action: manipulation;
    }

    .start-button:active,
    .big-button:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 var(--green-dark);
    }

    .history-entry {
      position: fixed;
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      min-height: 44px;
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: var(--white);
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }

    .question {
      color: var(--green-dark);
      font-size: clamp(48px, 15vw, 88px);
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: 0;
    }

    .status {
      color: var(--green-dark);
      font-size: clamp(44px, 14vw, 78px);
      line-height: 1.16;
      font-weight: 900;
    }

    .status.error {
      color: var(--red);
    }

    .summary {
      display: grid;
      gap: 12px;
      background: var(--white);
      border: 4px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      text-align: left;
    }

    .summary-row {
      font-size: clamp(27px, 7vw, 40px);
      line-height: 1.24;
      font-weight: 900;
      word-break: break-word;
    }

    .summary-row span {
      color: var(--muted);
    }

    .big-button {
      width: 100%;
      min-height: 112px;
      border: 0;
      border-radius: 8px;
      padding: 20px 16px;
      color: var(--white);
      background: var(--green);
      box-shadow: 0 6px 0 var(--green-dark);
      font-size: clamp(34px, 10vw, 58px);
      line-height: 1.18;
      font-weight: 900;
      touch-action: manipulation;
    }

    .big-button.secondary {
      color: var(--green-dark);
      background: var(--white);
      border: 4px solid var(--green);
      box-shadow: none;
    }

    .big-button.red {
      background: var(--red);
      box-shadow: 0 6px 0 #7d0e0e;
    }

    .actions,
    .history-actions {
      display: grid;
      gap: 18px;
    }

    .history-screen {
      gap: 18px;
    }

    h1 {
      margin: 0;
      color: var(--green-dark);
      font-size: clamp(36px, 10vw, 56px);
      line-height: 1.12;
      font-weight: 900;
      text-align: center;
      letter-spacing: 0;
    }

    .history-list {
      display: grid;
      gap: 18px;
    }

    .day,
    .record {
      background: var(--white);
      border: 4px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    .day h2 {
      margin: 0;
      color: var(--green-dark);
      font-size: clamp(32px, 9vw, 48px);
      line-height: 1.15;
    }

    .record {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      border-width: 3px;
    }

    .record-main {
      font-size: clamp(30px, 8vw, 44px);
      font-weight: 900;
    }

    .record-row {
      color: var(--text);
      font-size: clamp(24px, 6.5vw, 34px);
      font-weight: 800;
      word-break: break-word;
    }

    .delete-button {
      min-height: 76px;
      border: 4px solid var(--red);
      border-radius: 8px;
      color: var(--red);
      background: var(--white);
      font-size: clamp(26px, 7vw, 36px);
      font-weight: 900;
    }

    .empty {
      margin: auto 0;
      padding: 34px 8px;
      color: var(--muted);
      text-align: center;
      font-size: clamp(34px, 10vw, 56px);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="homeScreen" class="screen center active" aria-label="首页">
      <button id="startBtn" class="start-button" type="button">开始记录</button>
      <button id="historyEntry" class="history-entry" type="button">查看历史</button>
    </section>

    <section id="questionScreen" class="screen center" aria-label="语音问答">
      <div id="questionText" class="question">几点吃的药？</div>
      <div id="statusText" class="status">请回答</div>
    </section>

    <section id="completeScreen" class="screen center" aria-label="记录完成">
      <div class="status">已完成记录</div>
      <div id="summaryBox" class="summary"></div>
      <div class="actions">
        <button id="againBtn" class="big-button" type="button">再记录一次</button>
        <button id="historyBtn" class="big-button secondary" type="button">查看历史</button>
      </div>
    </section>

    <section id="historyScreen" class="screen history-screen" aria-label="历史记录">
      <h1>历史记录</h1>
      <div id="historyList" class="history-list"></div>
      <div class="history-actions">
        <button id="backBtn" class="big-button secondary" type="button">返回首页</button>
        <button id="clearBtn" class="big-button red" type="button">清空全部记录</button>
      </div>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      var STORAGE_KEY = "healthVoiceRecords.iphonePwa.v1";
      var LISTEN_TIMEOUT_MS = 8000;
      var RETRY_DELAY_MS = 1200;
      var questions = [
        { key: "medicineTime", label: "吃药时间", prompt: "几点吃的药？" },
        { key: "medicineName", label: "药物", prompt: "吃的什么药？" },
        { key: "bloodSugarTime", label: "测糖时间", prompt: "几点测的血糖？" },
        { key: "mealRelation", label: "饭前/饭后", prompt: "血糖是饭前还是饭后测的？" },
        { key: "bloodSugarValue", label: "血糖", prompt: "血糖是多少？" },
        { key: "bloodPressureValue", label: "血压", prompt: "血压是多少？" },
        { key: "symptoms", label: "不舒服", prompt: "今天有没有不舒服？" }
      ];

      var session = null;
      var activeRecognition = null;
      var listenTimer = null;
      var retryTimer = null;
      var recognitionDone = false;

      var homeScreen = document.getElementById("homeScreen");
      var questionScreen = document.getElementById("questionScreen");
      var completeScreen = document.getElementById("completeScreen");
      var historyScreen = document.getElementById("historyScreen");
      var startBtn = document.getElementById("startBtn");
      var historyEntry = document.getElementById("historyEntry");
      var questionText = document.getElementById("questionText");
      var statusText = document.getElementById("statusText");
      var summaryBox = document.getElementById("summaryBox");
      var againBtn = document.getElementById("againBtn");
      var historyBtn = document.getElementById("historyBtn");
      var historyList = document.getElementById("historyList");
      var backBtn = document.getElementById("backBtn");
      var clearBtn = document.getElementById("clearBtn");

      function showScreen(name) {
        homeScreen.classList.toggle("active", name === "home");
        questionScreen.classList.toggle("active", name === "question");
        completeScreen.classList.toggle("active", name === "complete");
        historyScreen.classList.toggle("active", name === "history");
        window.scrollTo(0, 0);
      }

      function two(value) {
        return String(value).padStart(2, "0");
      }

      function formatDate(date) {
        return date.getFullYear() + "-" + two(date.getMonth() + 1) + "-" + two(date.getDate());
      }

      function formatTime(date) {
        return two(date.getHours()) + ":" + two(date.getMinutes());
      }

      function getRecords() {
        try {
          var records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          return Array.isArray(records) ? records : [];
        } catch (error) {
          return [];
        }
      }

      function saveRecords(records) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }

      function clearTimers() {
        if (listenTimer) {
          window.clearTimeout(listenTimer);
          listenTimer = null;
        }
        if (retryTimer) {
          window.clearTimeout(retryTimer);
          retryTimer = null;
        }
      }

      function stopRecognition() {
        if (activeRecognition) {
          recognitionDone = true;
          try {
            activeRecognition.abort();
          } catch (error) {
            try {
              activeRecognition.stop();
            } catch (innerError) {}
          }
          activeRecognition = null;
        }
      }

      function stopAllAudioWork() {
        clearTimers();
        stopRecognition();
        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
        }
      }

      function chooseChineseVoice() {
        if (!("speechSynthesis" in window)) return null;
        var voices = window.speechSynthesis.getVoices() || [];
        var preferred = voices.find(function (voice) {
          return /zh-CN/i.test(voice.lang) || /Chinese|Mandarin|普通话|中文/i.test(voice.name);
        });
        return preferred || voices.find(function (voice) {
          return /^zh/i.test(voice.lang);
        }) || null;
      }

      function speak(text, done) {
        if (!("speechSynthesis" in window)) {
          window.setTimeout(done, 300);
          return;
        }

        window.speechSynthesis.cancel();
        var utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "zh-CN";
        utterance.rate = 0.75;
        utterance.volume = 1;
        utterance.pitch = 1;
        var voice = chooseChineseVoice();
        if (voice) utterance.voice = voice;

        var finished = false;
        var fallback = window.setTimeout(function () {
          if (finished) return;
          finished = true;
          done();
        }, Math.max(2500, text.length * 600));

        utterance.onend = function () {
          if (finished) return;
          finished = true;
          window.clearTimeout(fallback);
          done();
        };
        utterance.onerror = function () {
          if (finished) return;
          finished = true;
          window.clearTimeout(fallback);
          done();
        };
        window.speechSynthesis.speak(utterance);
      }

      function startSession() {
        stopAllAudioWork();
        session = {
          index: 0,
          answers: {},
          answersRaw: {},
          failures: {}
        };
        showScreen("question");
        askCurrentQuestion();
      }

      function askCurrentQuestion() {
        if (!session) return;
        if (session.index >= questions.length) {
          finishSession();
          return;
        }

        var question = questions[session.index];
        clearTimers();
        stopRecognition();
        questionText.textContent = question.prompt;
        statusText.textContent = "";
        statusText.classList.remove("error");
        showScreen("question");

        speak(question.prompt, function () {
          if (!session || session.index >= questions.length) return;
          statusText.textContent = "请回答";
          startListeningForAnswer();
        });
      }

      function getRecognitionConstructor() {
        return window.SpeechRecognition || window.webkitSpeechRecognition || null;
      }

      function startListeningForAnswer() {
        var Recognition = getRecognitionConstructor();
        if (!Recognition) {
          handleNoAnswer();
          return;
        }

        clearTimers();
        stopRecognition();
        recognitionDone = false;

        var recognition = new Recognition();
        activeRecognition = recognition;
        recognition.lang = "zh-CN";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.continuous = false;

        listenTimer = window.setTimeout(function () {
          handleNoAnswer();
        }, LISTEN_TIMEOUT_MS);

        recognition.onresult = function (event) {
          if (recognitionDone) return;
          recognitionDone = true;
          clearTimers();

          var text = "";
          if (event.results && event.results[0] && event.results[0][0]) {
            text = event.results[0][0].transcript || "";
          }

          if (!String(text).trim()) {
            handleNoAnswer();
            return;
          }

          activeRecognition = null;
          saveAnswer(String(text).trim());
        };

        recognition.onerror = function () {
          if (recognitionDone) return;
          recognitionDone = true;
          handleNoAnswer();
        };

        recognition.onend = function () {
          if (recognitionDone) return;
          recognitionDone = true;
          handleNoAnswer();
        };

        try {
          recognition.start();
        } catch (error) {
          handleNoAnswer();
        }
      }

      function handleNoAnswer() {
        if (!session || session.index >= questions.length) return;
        clearTimers();
        stopRecognition();

        var question = questions[session.index];
        var failCount = (session.failures[question.key] || 0) + 1;
        session.failures[question.key] = failCount;

        statusText.textContent = "没听清，请再说一遍";
        statusText.classList.add("error");
        showScreen("question");

        if (failCount >= 2) {
          session.answers[question.key] = "未记录";
          session.answersRaw[question.key] = "未记录";
          retryTimer = window.setTimeout(function () {
            session.index += 1;
            askCurrentQuestion();
          }, RETRY_DELAY_MS);
          return;
        }

        retryTimer = window.setTimeout(function () {
          askCurrentQuestion();
        }, RETRY_DELAY_MS);
      }

      function saveAnswer(text) {
        if (!session || session.index >= questions.length) return;
        var question = questions[session.index];
        session.answers[question.key] = text || "未记录";
        session.answersRaw[question.key] = text || "未记录";
        session.index += 1;
        askCurrentQuestion();
      }

      function finishSession() {
        if (!session) return;
        stopAllAudioWork();

        var now = new Date();
        var answers = session.answers;
        var raw = session.answersRaw;
        var record = {
          id: String(Date.now()) + "-" + Math.random().toString(16).slice(2),
          recordDate: formatDate(now),
          recordTime: formatTime(now),
          medicineTime: answers.medicineTime || "未记录",
          medicineName: answers.medicineName || "未记录",
          bloodSugarTime: answers.bloodSugarTime || "未记录",
          mealRelation: answers.mealRelation || "未记录",
          bloodSugarValue: answers.bloodSugarValue || "未记录",
          bloodPressureValue: answers.bloodPressureValue || "未记录",
          symptoms: answers.symptoms || "未记录",
          answersRaw: {
            medicineTime: raw.medicineTime || "未记录",
            medicineName: raw.medicineName || "未记录",
            bloodSugarTime: raw.bloodSugarTime || "未记录",
            mealRelation: raw.mealRelation || "未记录",
            bloodSugarValue: raw.bloodSugarValue || "未记录",
            bloodPressureValue: raw.bloodPressureValue || "未记录",
            symptoms: raw.symptoms || "未记录"
          },
          createdAt: now.toISOString()
        };

        var records = getRecords();
        records.push(record);
        records.sort(function (a, b) {
          return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
        });
        saveRecords(records);
        session = null;
        renderSummary(record);
        showScreen("complete");
      }

      function renderSummary(record) {
        summaryBox.innerHTML = "";
        [
          ["吃药时间", record.medicineTime],
          ["药物", record.medicineName],
          ["测糖时间", record.bloodSugarTime],
          ["饭前/饭后", record.mealRelation],
          ["血糖", record.bloodSugarValue],
          ["血压", record.bloodPressureValue],
          ["不舒服", record.symptoms]
        ].forEach(function (item) {
          var row = document.createElement("div");
          row.className = "summary-row";
          row.innerHTML = "<span>" + item[0] + "：</span>" + escapeHtml(item[1]);
          summaryBox.appendChild(row);
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderHistory() {
        var records = getRecords();
        historyList.innerHTML = "";
        if (!records.length) {
          historyList.innerHTML = '<div class="empty">还没有记录</div>';
          return;
        }

        var groups = {};
        records.forEach(function (record) {
          var date = record.recordDate || record.date || "未记录日期";
          if (!groups[date]) groups[date] = [];
          groups[date].push(record);
        });

        Object.keys(groups).sort().reverse().forEach(function (date) {
          var day = document.createElement("div");
          day.className = "day";
          var title = document.createElement("h2");
          title.textContent = date;
          day.appendChild(title);

          groups[date].sort(function (a, b) {
            return String(b.recordTime || b.time || "").localeCompare(String(a.recordTime || a.time || ""));
          }).forEach(function (record) {
            day.appendChild(createHistoryItem(record));
          });

          historyList.appendChild(day);
        });
      }

      function createHistoryItem(record) {
        var item = document.createElement("div");
        item.className = "record";

        var main = document.createElement("div");
        main.className = "record-main";
        main.textContent = "记录时间：" + (record.recordTime || record.time || "未记录");
        item.appendChild(main);

        [
          ["吃药时间", record.medicineTime],
          ["药物", record.medicineName],
          ["测糖时间", record.bloodSugarTime],
          ["饭前/饭后", record.mealRelation],
          ["血糖", record.bloodSugarValue],
          ["血压", record.bloodPressureValue],
          ["不舒服", record.symptoms]
        ].forEach(function (rowData) {
          var row = document.createElement("div");
          row.className = "record-row";
          row.textContent = rowData[0] + "：" + (rowData[1] || "未记录");
          item.appendChild(row);
        });

        var del = document.createElement("button");
        del.className = "delete-button";
        del.type = "button";
        del.textContent = "删除这条";
        del.addEventListener("click", function () {
          deleteRecord(record.id);
        });
        item.appendChild(del);

        return item;
      }

      function deleteRecord(id) {
        saveRecords(getRecords().filter(function (record) {
          return record.id !== id;
        }));
        renderHistory();
      }

      function clearAll() {
        if (!getRecords().length) return;
        if (!window.confirm("确定清空全部记录吗？")) return;
        saveRecords([]);
        renderHistory();
      }

      startBtn.addEventListener("click", startSession);
      againBtn.addEventListener("click", startSession);
      historyBtn.addEventListener("click", function () {
        session = null;
        stopAllAudioWork();
        renderHistory();
        showScreen("history");
      });
      historyEntry.addEventListener("click", function () {
        session = null;
        stopAllAudioWork();
        renderHistory();
        showScreen("history");
      });
      backBtn.addEventListener("click", function () {
        session = null;
        stopAllAudioWork();
        showScreen("home");
      });
      clearBtn.addEventListener("click", clearAll);

      if ("speechSynthesis" in window) {
        window.speechSynthesis.onvoiceschanged = chooseChineseVoice;
      }

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("service-worker.js").catch(function () {});
        });
      }
    })();
  </script>
</body>
</html>
