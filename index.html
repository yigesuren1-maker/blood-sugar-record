<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6b3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="血糖记录">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>血糖记录</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #fffdf2;
      --text: #101010;
      --muted: #464646;
      --green: #0b6b3a;
      --green-dark: #084e2b;
      --line: #cfcfcf;
      --red: #c51616;
      --blue: #075fc0;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 26px;
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    .screen.active {
      display: flex;
    }

    .home {
      justify-content: center;
      padding-bottom: 78px;
    }

    .main-button {
      width: 100%;
      min-height: 78vh;
      border: 0;
      border-radius: 10px;
      padding: 28px 20px;
      background: var(--green);
      color: var(--white);
      box-shadow: 0 9px 0 var(--green-dark);
      font-size: clamp(48px, 16vw, 88px);
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: 0;
      touch-action: manipulation;
    }

    .main-button:active {
      transform: translateY(5px);
      box-shadow: 0 4px 0 var(--green-dark);
    }

    .history-entry {
      position: fixed;
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      min-height: 44px;
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: var(--white);
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }

    .center-message {
      justify-content: center;
      gap: 28px;
      text-align: center;
    }

    .message {
      color: var(--green-dark);
      font-size: clamp(54px, 16vw, 92px);
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: 0;
    }

    .message.error {
      color: var(--red);
    }

    .message.small {
      font-size: clamp(42px, 13vw, 76px);
    }

    .alert {
      display: none;
      border-radius: 8px;
      padding: 16px;
      font-size: clamp(36px, 10vw, 56px);
      font-weight: 900;
      line-height: 1.16;
      text-align: center;
    }

    .alert.high {
      display: block;
      border: 4px solid var(--red);
      color: var(--red);
      background: #fff0f0;
    }

    .alert.low {
      display: block;
      border: 4px solid var(--blue);
      color: var(--blue);
      background: #eef6ff;
    }

    .big-button {
      width: 100%;
      min-height: 112px;
      border: 0;
      border-radius: 8px;
      padding: 20px 16px;
      color: var(--white);
      background: var(--green);
      box-shadow: 0 6px 0 var(--green-dark);
      font-size: clamp(34px, 10vw, 58px);
      line-height: 1.18;
      font-weight: 900;
      touch-action: manipulation;
    }

    .big-button.secondary {
      color: var(--green-dark);
      background: var(--white);
      border: 4px solid var(--green);
      box-shadow: none;
    }

    .big-button.red {
      background: var(--red);
      box-shadow: 0 6px 0 #7d0e0e;
    }

    .history-screen {
      gap: 18px;
    }

    h1 {
      margin: 0;
      color: var(--green-dark);
      font-size: clamp(36px, 10vw, 56px);
      line-height: 1.12;
      font-weight: 900;
      text-align: center;
      letter-spacing: 0;
    }

    .history-list {
      display: grid;
      gap: 18px;
    }

    .day {
      background: var(--white);
      border: 4px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    .day h2 {
      margin: 0 0 10px;
      color: var(--green-dark);
      font-size: clamp(32px, 9vw, 48px);
      line-height: 1.15;
    }

    .record {
      display: grid;
      gap: 10px;
      padding: 16px 0;
      border-top: 3px solid var(--line);
    }

    .record-main {
      font-size: clamp(30px, 8vw, 44px);
      font-weight: 900;
    }

    .record-note {
      color: var(--muted);
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 800;
      word-break: break-word;
    }

    .delete-button {
      min-height: 76px;
      border: 4px solid var(--red);
      border-radius: 8px;
      color: var(--red);
      background: var(--white);
      font-size: clamp(26px, 7vw, 36px);
      font-weight: 900;
    }

    .history-actions {
      display: grid;
      gap: 18px;
      margin-top: auto;
    }

    .empty {
      margin: auto 0;
      padding: 34px 8px;
      color: var(--muted);
      text-align: center;
      font-size: clamp(34px, 10vw, 56px);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="homeScreen" class="screen home active" aria-label="首页">
      <button id="startBtn" class="main-button" type="button">开始说话记录血糖</button>
      <button id="historyEntry" class="history-entry" type="button">查看历史</button>
    </section>

    <section id="listeningScreen" class="screen center-message" aria-label="正在听">
      <div class="message">正在听，请说血糖</div>
    </section>

    <section id="resultScreen" class="screen center-message" aria-label="记录成功">
      <div id="resultText" class="message small">已记录</div>
      <div id="sugarAlert" class="alert"></div>
      <button id="againBtn" class="big-button" type="button">继续记录</button>
    </section>

    <section id="errorScreen" class="screen center-message" aria-label="重新说">
      <div id="errorText" class="message error">没听清，请再说一遍</div>
      <button id="retryBtn" class="big-button" type="button">重新说一遍</button>
    </section>

    <section id="historyScreen" class="screen history-screen" aria-label="历史记录">
      <h1>历史记录</h1>
      <div id="historyList" class="history-list"></div>
      <div class="history-actions">
        <button id="backBtn" class="big-button secondary" type="button">返回首页</button>
        <button id="clearBtn" class="big-button red" type="button">清空全部记录</button>
      </div>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      var STORAGE_KEY = "bloodSugarRecords.iphonePwa.v1";
      var HIGH_LIMIT = 10;
      var LOW_LIMIT = 3.9;
      var listenTimer = null;
      var activeRecognition = null;

      var homeScreen = document.getElementById("homeScreen");
      var listeningScreen = document.getElementById("listeningScreen");
      var resultScreen = document.getElementById("resultScreen");
      var errorScreen = document.getElementById("errorScreen");
      var historyScreen = document.getElementById("historyScreen");
      var startBtn = document.getElementById("startBtn");
      var historyEntry = document.getElementById("historyEntry");
      var resultText = document.getElementById("resultText");
      var sugarAlert = document.getElementById("sugarAlert");
      var againBtn = document.getElementById("againBtn");
      var errorText = document.getElementById("errorText");
      var retryBtn = document.getElementById("retryBtn");
      var historyList = document.getElementById("historyList");
      var backBtn = document.getElementById("backBtn");
      var clearBtn = document.getElementById("clearBtn");

      function showScreen(name) {
        homeScreen.classList.toggle("active", name === "home");
        listeningScreen.classList.toggle("active", name === "listening");
        resultScreen.classList.toggle("active", name === "result");
        errorScreen.classList.toggle("active", name === "error");
        historyScreen.classList.toggle("active", name === "history");
        window.scrollTo(0, 0);
      }

      function two(value) {
        return String(value).padStart(2, "0");
      }

      function formatDate(date) {
        return date.getFullYear() + "-" + two(date.getMonth() + 1) + "-" + two(date.getDate());
      }

      function formatTime(date) {
        return two(date.getHours()) + ":" + two(date.getMinutes());
      }

      function periodByText(text) {
        if (/早上|早晨|早餐前/.test(text)) return "早上";
        if (/中午|午饭前|午餐前/.test(text)) return "中午";
        if (/晚上|晚饭前|晚餐前/.test(text)) return "晚上";
        return "";
      }

      function periodByTime(date) {
        var hour = date.getHours();
        if (hour >= 5 && hour <= 10) return "早上";
        if (hour >= 11 && hour <= 15) return "中午";
        if (hour >= 16 && hour <= 22) return "晚上";
        return "其他";
      }

      function parseValue(text) {
        var normalized = String(text || "")
          .replace(/[，。；;：:]/g, " ")
          .replace(/点/g, ".")
          .replace(/零/g, "0")
          .replace(/一/g, "1")
          .replace(/二/g, "2")
          .replace(/两/g, "2")
          .replace(/三/g, "3")
          .replace(/四/g, "4")
          .replace(/五/g, "5")
          .replace(/六/g, "6")
          .replace(/七/g, "7")
          .replace(/八/g, "8")
          .replace(/九/g, "9");
        var sugarMatch = normalized.match(/血糖\s*([0-9]+(?:\.[0-9]+)?)/);
        var numberMatch = normalized.match(/([0-9]+(?:\.[0-9]+)?)/);
        var valueText = sugarMatch ? sugarMatch[1] : (numberMatch ? numberMatch[1] : "");
        var value = Number(valueText);
        if (!Number.isFinite(value) || value <= 0 || value > 40) return null;
        return Math.round(value * 10) / 10;
      }

      function getRecords() {
        try {
          var records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          return Array.isArray(records) ? records : [];
        } catch (error) {
          return [];
        }
      }

      function saveRecords(records) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }

      function saveRecognizedText(rawText) {
        var value = parseValue(rawText);
        if (value === null) return null;

        var now = new Date();
        var period = periodByText(rawText) || periodByTime(now);
        var record = {
          id: String(Date.now()) + "-" + Math.random().toString(16).slice(2),
          date: formatDate(now),
          time: formatTime(now),
          period: period,
          value: value,
          rawText: String(rawText || "").trim(),
          source: "语音",
          createdAt: now.toISOString()
        };
        var records = getRecords();
        records.push(record);
        records.sort(function (a, b) {
          return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
        });
        saveRecords(records);
        return record;
      }

      function clearListenTimer() {
        if (listenTimer) {
          window.clearTimeout(listenTimer);
          listenTimer = null;
        }
      }

      function stopRecognition() {
        clearListenTimer();
        if (activeRecognition) {
          try {
            activeRecognition.stop();
          } catch (error) {}
          activeRecognition = null;
        }
      }

      function showSugarAlert(value) {
        sugarAlert.className = "alert";
        sugarAlert.textContent = "";
        if (value >= HIGH_LIMIT) {
          sugarAlert.textContent = "血糖偏高，请注意";
          sugarAlert.classList.add("high");
        } else if (value <= LOW_LIMIT) {
          sugarAlert.textContent = "血糖偏低，请注意";
          sugarAlert.classList.add("low");
        }
      }

      function showError(text) {
        stopRecognition();
        errorText.textContent = text || "没听清，请再说一遍";
        showScreen("error");
      }

      function startVoice() {
        var Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Recognition) {
          showError("没听清，请再说一遍");
          return;
        }

        stopRecognition();
        showScreen("listening");

        var recognition = new Recognition();
        activeRecognition = recognition;
        recognition.lang = "zh-CN";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.continuous = false;

        listenTimer = window.setTimeout(function () {
          showError("没听清，请再说一遍");
        }, 8000);

        recognition.onresult = function (event) {
          var text = "";
          if (event.results && event.results[0] && event.results[0][0]) {
            text = event.results[0][0].transcript || "";
          }
          clearListenTimer();
          activeRecognition = null;
          var record = saveRecognizedText(text);
          if (!record) {
            showError("没听清，请再说一遍");
            return;
          }
          resultText.textContent = "已记录：" + record.period + "血糖 " + record.value;
          showSugarAlert(record.value);
          showScreen("result");
        };

        recognition.onerror = function () {
          showError("没听清，请再说一遍");
        };

        recognition.onend = function () {
          clearListenTimer();
          activeRecognition = null;
        };

        try {
          recognition.start();
        } catch (error) {
          showError("没听清，请再说一遍");
        }
      }

      function renderHistory() {
        var records = getRecords();
        historyList.innerHTML = "";
        if (!records.length) {
          historyList.innerHTML = '<div class="empty">还没有记录</div>';
          return;
        }

        var groups = {};
        records.forEach(function (record) {
          if (!groups[record.date]) groups[record.date] = [];
          groups[record.date].push(record);
        });

        Object.keys(groups).sort().reverse().forEach(function (date) {
          var day = document.createElement("div");
          day.className = "day";
          var title = document.createElement("h2");
          title.textContent = date;
          day.appendChild(title);

          groups[date].sort(function (a, b) {
            return b.time.localeCompare(a.time);
          }).forEach(function (record) {
            var item = document.createElement("div");
            item.className = "record";

            var main = document.createElement("div");
            main.className = "record-main";
            main.textContent = record.time + "  " + record.period + "  血糖 " + record.value;

            var note = document.createElement("div");
            note.className = "record-note";
            note.textContent = "原始语音：" + (record.rawText || "");

            var del = document.createElement("button");
            del.className = "delete-button";
            del.type = "button";
            del.textContent = "删除这条";
            del.addEventListener("click", function () {
              deleteRecord(record.id);
            });

            item.appendChild(main);
            item.appendChild(note);
            item.appendChild(del);
            day.appendChild(item);
          });

          historyList.appendChild(day);
        });
      }

      function deleteRecord(id) {
        saveRecords(getRecords().filter(function (record) {
          return record.id !== id;
        }));
        renderHistory();
      }

      function clearAll() {
        if (!getRecords().length) return;
        if (!window.confirm("确定清空全部血糖记录吗？")) return;
        saveRecords([]);
        renderHistory();
      }

      startBtn.addEventListener("click", startVoice);
      retryBtn.addEventListener("click", startVoice);
      againBtn.addEventListener("click", startVoice);
      historyEntry.addEventListener("click", function () {
        stopRecognition();
        renderHistory();
        showScreen("history");
      });
      backBtn.addEventListener("click", function () {
        showScreen("home");
      });
      clearBtn.addEventListener("click", clearAll);

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("service-worker.js").catch(function () {});
        });
      }
    })();
  </script>
</body>
</html>
