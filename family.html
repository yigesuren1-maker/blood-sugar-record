<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b6b3a">
  <title>家属查看</title>
  <style>
    :root {
      --bg: #f7f7f2;
      --text: #111111;
      --muted: #555555;
      --green: #0b6b3a;
      --line: #d0d0d0;
      --red: #c51616;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .page {
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    h1 {
      margin: 0;
      color: var(--green);
      font-size: clamp(34px, 8vw, 52px);
      line-height: 1.15;
    }

    .toolbar,
    .record {
      background: var(--white);
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .toolbar {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    label {
      color: var(--muted);
      font-size: 20px;
      font-weight: 800;
    }

    input,
    button {
      min-height: 48px;
      border-radius: 8px;
      font: inherit;
      font-size: 20px;
      font-weight: 800;
    }

    input {
      width: 100%;
      border: 2px solid var(--line);
      padding: 8px 10px;
      background: var(--white);
    }

    button {
      border: 0;
      padding: 8px 14px;
      color: var(--white);
      background: var(--green);
    }

    button.secondary {
      color: var(--green);
      background: var(--white);
      border: 2px solid var(--green);
    }

    button.red {
      color: var(--red);
      background: var(--white);
      border: 2px solid var(--red);
    }

    .status {
      color: var(--muted);
      font-size: 20px;
      font-weight: 800;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .record {
      display: grid;
      gap: 8px;
    }

    .record-time {
      color: var(--green);
      font-size: 26px;
      font-weight: 900;
    }

    .row {
      font-size: 20px;
      line-height: 1.35;
      word-break: break-word;
    }

    .row span {
      color: var(--muted);
      font-weight: 900;
    }

    @media (min-width: 720px) {
      .toolbar {
        grid-template-columns: 1fr auto auto;
        align-items: end;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>家属查看</h1>
    <section class="toolbar">
      <div>
        <label for="dateFilter">按日期筛选</label>
        <input id="dateFilter" type="date">
      </div>
      <button id="refreshBtn" type="button">刷新</button>
      <button id="clearFilterBtn" class="secondary" type="button">清除筛选</button>
    </section>
    <div id="statusText" class="status">正在加载...</div>
    <section id="recordList" class="list"></section>
  </main>

  <script>
    (function () {
      "use strict";

      var CONFIG = {
        elderId: "elder001",
        family_key: "family001",
        supabaseUrl: "https://xnkxxlcacgmpbmnkajmj.supabase.co",
        supabaseKey: "sb_publishable_nhxIkOeV3vyxSl2ctH6O8g_b0nz9Rz8"
      };

      var dateFilter = document.getElementById("dateFilter");
      var refreshBtn = document.getElementById("refreshBtn");
      var clearFilterBtn = document.getElementById("clearFilterBtn");
      var statusText = document.getElementById("statusText");
      var recordList = document.getElementById("recordList");

      function setStatus(text) {
        statusText.textContent = text;
      }

      function loadRecords() {
        setStatus("正在加载...");
        recordList.innerHTML = "";
        var url = CONFIG.supabaseUrl + "/rest/v1/health_records"
          + "?family_key=eq." + encodeURIComponent(CONFIG.family_key)
          + "&select=id,family_key,value,period,note,created_at"
          + "&order=created_at.desc";
        console.log("supabase list health_records url", url);
        fetch(url, {
          method: "GET",
          headers: {
            "apikey": CONFIG.supabaseKey,
            "Authorization": "Bearer " + CONFIG.supabaseKey
          }
        }).then(function (response) {
          if (!response.ok) {
            return response.text().then(function (text) {
              throw new Error("HTTP " + response.status + " " + response.statusText + " " + text);
            });
          }
          return response.json();
        }).then(function (res) {
          console.log("family records", res || []);
          var records = normalizeSupabaseRecords(res || []);
          var filtered = filterByDate(records, dateFilter.value);
          renderRecords(filtered);
          setStatus(filtered.length ? "共 " + filtered.length + " 条记录" : "没有记录");
        }).catch(function (error) {
          setStatus("加载失败：" + getErrorMessage(error));
        });
      }

      function unwrapFunctionResult(res) {
        if (!res) return {};
        if (typeof res.body === "string") {
          try {
            return JSON.parse(res.body);
          } catch (error) {
            return {};
          }
        }
        return res.result || res;
      }

      function cleanPayload(value) {
        if (Array.isArray(value)) {
          return value.map(cleanPayload).filter(function (item) {
            return item !== undefined && item !== null;
          });
        }
        if (value && typeof value === "object") {
          var output = {};
          Object.keys(value).forEach(function (key) {
            var item = cleanPayload(value[key]);
            if (item !== undefined && item !== null) output[key] = item;
          });
          return output;
        }
        return value;
      }

      function normalizeSupabaseRecords(rows) {
        return rows.map(function (row) {
          var note = parseNote(row.note);
          var type = detectRecordType(row, note);
          var summary = buildSummaryText(row, note);
          return {
            id: row.id,
            raw: row,
            note: note,
            recordType: type,
            summary: summary,
            recordDate: note.recordDate || formatDateFromIso(row.created_at),
            recordTime: note.recordTime || formatTimeFromIso(row.created_at),
            medicineName: note.medicineName || "未记录",
            medicineCount: note.medicineCount || "未记录",
            mealRelation: note.mealRelation || row.period || "未记录",
            bloodSugarValue: note.bloodSugarValue || note.bloodSugarValueText || row.value || "未记录",
            systolicPressure: note.systolicPressure || "未记录",
            diastolicPressure: note.diastolicPressure || "未记录",
            sleepQuality: note.sleepQuality || "未填写",
            sleepTimeText: note.sleepTimeText || joinParts([note.sleepTime, note.wakeTime], " / ") || "未填写",
            dayRest: note.dayRest || "未填写",
            medicineTaken: note.medicineTaken || note.medicationStatus || "未填写",
            medicineDetail: note.medicineDetail || "未填写",
            createdAt: row.created_at
          };
        });
      }

      function parseNote(note) {
        if (!note) return {};
        if (typeof note === "object") return note;
        try {
          return JSON.parse(note);
        } catch (error) {
          return { summary: String(note) };
        }
      }

      function detectRecordType(row, note) {
        var text = [
          note.recordType,
          note.type,
          note.category,
          row.period,
          note.content,
          note.summary,
          note.text,
          note.remark,
          note.rawText,
          typeof row.note === "string" ? row.note : ""
        ].map(function (item) {
          return typeof item === "object" ? JSON.stringify(item || {}) : String(item || "");
        }).join(" ");
        if (/睡眠/.test(text)) return "睡眠";
        if (/用药|吃药/.test(text)) return "用药";
        if (/血糖|饭前|饭后|空腹|睡前/.test(text)) return "血糖";
        return "旧记录";
      }

      function buildSummaryText(row, note) {
        var candidates = [
          note.summary,
          note.content,
          note.text,
          note.remark,
          note.rawText,
          note.data,
          note.raw
        ];
        for (var i = 0; i < candidates.length; i += 1) {
          var value = candidates[i];
          if (value === undefined || value === null || value === "") continue;
          return typeof value === "object" ? JSON.stringify(value) : String(value);
        }
        return typeof row.note === "string" && row.note.charAt(0) !== "{" ? row.note : "";
      }

      function joinParts(parts, separator) {
        return parts.filter(function (item) {
          return item && item !== "未说明" && item !== "未记录" && item !== "未填写";
        }).join(separator);
      }

      function filterByDate(records, date) {
        if (!date) return records;
        return records.filter(function (record) {
          return record.recordDate === date;
        });
      }

      function formatDateFromIso(value) {
        if (!value) return "";
        var date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        return date.getFullYear() + "-" + two(date.getMonth() + 1) + "-" + two(date.getDate());
      }

      function formatTimeFromIso(value) {
        if (!value) return "";
        var date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        return two(date.getHours()) + ":" + two(date.getMinutes());
      }

      function two(value) {
        return String(value).padStart(2, "0");
      }

      function getErrorMessage(error) {
        if (!error) return "未知错误";
        if (typeof error === "string") return error;
        return error.message || error.errMsg || JSON.stringify(error);
      }

      function renderRecords(records) {
        recordList.innerHTML = "";
        records.forEach(function (record) {
          var item = document.createElement("article");
          item.className = "record";
          item.innerHTML = renderRecordCard(record);
          recordList.appendChild(item);
        });
      }

      function renderRecordCard(record) {
        var title = "【" + displayType(record.recordType) + "】" + (record.recordDate || "") + " " + (record.recordTime || "");
        var html = '<div class="record-time">' + escapeHtml(title) + "</div>";
        if (record.recordType === "血糖") {
          html += row("时段", record.mealRelation);
          html += row("血糖值", record.bloodSugarValue);
          html += row("用药/打针情况", joinParts([record.medicineTaken, record.medicineDetail], "，") || "未填写");
          if (record.summary) html += row("记录内容", record.summary);
          return html;
        }
        if (record.recordType === "睡眠") {
          html += row("睡眠情况", record.sleepQuality);
          html += row("睡眠时间", record.sleepTimeText);
          html += row("白天休息", record.dayRest);
          html += row("用药情况", joinParts([record.medicineTaken, record.medicineDetail], "，") || "未填写");
          if (record.summary) html += row("记录内容", record.summary);
          return html;
        }
        if (record.recordType === "用药") {
          html += row("用药情况", record.medicineTaken);
          html += row("用药详情", record.medicineDetail);
          if (record.summary) html += row("记录内容", record.summary);
          return html;
        }
        html += row("记录时间", record.recordTime);
        html += row("高压", record.systolicPressure);
        html += row("低压", record.diastolicPressure);
        html += row("饭前/饭后", record.mealRelation);
        html += row("血糖", record.bloodSugarValue);
        html += row("降糖药", record.medicineName);
        html += row("吃了几片", record.medicineCount);
        return html;
      }

      function displayType(type) {
        return type && type !== "旧记录" ? type : "记录";
      }

      function row(label, value) {
        return '<div class="row"><span>' + escapeHtml(label) + '：</span>' + escapeHtml(cleanDisplayValue(value)) + "</div>";
      }

      function cleanDisplayValue(value) {
        if (value === undefined || value === null || value === "") return "未填写";
        if (typeof value === "object") return JSON.stringify(value);
        return String(value);
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      refreshBtn.addEventListener("click", loadRecords);
      clearFilterBtn.addEventListener("click", function () {
        dateFilter.value = "";
        loadRecords();
      });
      dateFilter.addEventListener("change", loadRecords);
      window.addEventListener("load", loadRecords);
    })();
  </script>
</body>
</html>
